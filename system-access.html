<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Access - ROMEO BARBERSHOP</title>
  <style>
    :root {
      --ink: #2a2118;
      --muted: #77695c;
      --success: #18794e;
      --danger: #ba3a2c;
      --border: #e5d5be;
      --shadow: 0 18px 40px rgba(76,54,28,.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(183,134,63,0.18), transparent 28%),
        linear-gradient(135deg, #f8f2e8 0%, #f0e4d0 100%);
      color: var(--ink);
    }

    .app {
      min-height: 100vh;
      padding: 24px;
    }

    .header {
      position: relative;
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: #ffffff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      text-align: center;
    }

    .header-menu {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 20;
    }

    .menu-toggle {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: #fff;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 28px;
      line-height: 1;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(34,23,12,0.34);
      display: none;
      z-index: 999;
    }

    .sidebar-overlay.active {
      display: block;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -320px;
      width: min(320px, 85vw);
      height: 100vh;
      background: #fffaf2;
      border-right: 1px solid rgba(229,213,190,.8);
      box-shadow: var(--shadow);
      padding: 24px 18px;
      z-index: 1000;
      transition: left 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .sidebar.active {
      left: 0;
    }

    .sidebar h3 {
      margin: 0 0 8px;
      color: #2a2118;
      font-size: 22px;
      text-align: left;
      direction: ltr;
    }

    .sidebar-link,
    .sidebar button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      background: #ead9bd;
      color: var(--ink);
      text-align: left;
      direction: ltr;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .sidebar-link.active {
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: white;
    }

    .layout {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 24px;
    }

    .panel {
      background: rgba(255,250,242,0.95);
      border: 1px solid rgba(229,213,190,.8);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .panel h2 {
      margin: 0 0 8px;
    }

    .panel p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .field input {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 16px;
      background: #fffaf2;
      outline: none;
    }

    .permissions {
      display: grid;
      gap: 10px;
      margin-bottom: 20px;
    }

    .permission-item {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fffaf2;
      padding: 12px 14px;
    }

    .actions,
    .user-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .primary-btn,
    .secondary-btn,
    .danger-btn {
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--success), #0f5a39);
      color: white;
    }

    .secondary-btn {
      background: #ead9bd;
      color: var(--ink);
    }

    .danger-btn {
      background: linear-gradient(135deg, var(--danger), #8f281f);
      color: white;
    }

    .users-list {
      display: grid;
      gap: 12px;
    }

    .user-card {
      background: #fffaf2;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    .user-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
    }

    .user-card small,
    .user-card p {
      color: var(--muted);
      margin: 0 0 12px;
    }

    .status {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      display: none;
    }

    .status.success {
      display: block;
      background: rgba(23,121,78,0.12);
      color: var(--success);
      border: 1px solid rgba(23,121,78,0.18);
    }

    .status.error {
      display: block;
      background: rgba(186,58,44,0.12);
      color: var(--danger);
      border: 1px solid rgba(186,58,44,0.18);
    }

    @media (max-width: 960px) {
      .header-menu {
        position: static;
        width: 100%;
        margin-bottom: 16px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .app {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-menu">
        <button type="button" class="menu-toggle" id="menuToggle">⋯</button>
      </div>

      <h1>ROMEO BARBERSHOP</h1>
    </div>

    <div class="layout">
      <section class="panel">
        <h2>إضافة أو تعديل مستخدم</h2>
        <p>أضف اليوزر نيم والباسورد واسم صاحب اليوزر ثم اختر الصلاحيات التي تريدها له.</p>

        <div class="field">
          <label for="displayName">اسم صاحب اليوزر</label>
          <input id="displayName" type="text" placeholder="مثال: أحمد">
        </div>

        <div class="field">
          <label for="username">اليوزر نيم</label>
          <input id="username" type="text" placeholder="مثال: ahmed">
        </div>

        <div class="field">
          <label for="password">الباسورد</label>
          <input id="password" type="text" placeholder="اكتب الباسورد">
        </div>

        <div class="permissions">
          <label class="permission-item"><input type="checkbox" value="access_cashier" checked> يفتح شاشة الكاشير</label>
          <label class="permission-item"><input type="checkbox" value="edit_prices"> يعدل الأسعار</label>
          <label class="permission-item"><input type="checkbox" value="view_income_statement"> يفتح income statement</label>
          <label class="permission-item"><input type="checkbox" value="view_staff_accounting"> يفتح staff accounting</label>
          <label class="permission-item"><input type="checkbox" value="manage_users"> يدير المستخدمين والصلاحيات</label>
        </div>

        <div class="actions">
          <button class="primary-btn" type="button" id="saveUserBtn">حفظ المستخدم</button>
          <button class="secondary-btn" type="button" id="resetFormBtn">تفريغ الحقول</button>
        </div>

        <div class="status" id="statusBox"></div>
      </section>

      <section class="panel">
        <h2>المستخدمون الحاليون</h2>
        <p>يمكنك تعديل أي مستخدم أو حذف أي مستخدم غير مالك النظام.</p>
        <div class="users-list" id="usersList"></div>
      </section>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <h3>Menu</h3>
    <button class="sidebar-link" type="button" data-href="index.html" data-permission="access_cashier">cashier</button>
    <button class="sidebar-link" type="button" data-href="income-statement.html" data-permission="view_income_statement">income statement</button>
    <button class="sidebar-link" type="button" data-href="staff-accounting.html" data-permission="view_staff_accounting">staff accounting</button>
    <button class="sidebar-link active" type="button">system access</button>
    <button class="sidebar-link" type="button" data-href="withdrawals.html">Withdrawals</button>
    <button class="sidebar-link" type="button" data-href="expenses.html">Expenses</button>
    <button class="sidebar-link" type="button" data-href="enventory.html">Enventory</button>
    <button class="sidebar-link" type="button" data-href="staff-discount.html">staff Discount</button>
    <button class="sidebar-link" type="button" data-href="attendance.html">Attendance</button>
    <button class="sidebar-link" type="button" data-href="bookings.html">Bookings</button>
    <button class="sidebar-link" type="button" data-href="customer-data.html">Customer Data</button>
    <button type="button" id="logoutBtn">Logout</button>
  </aside>

  <script src="./text-fix.js"></script>
  <script src="./auth.js"></script>
  <script>
    RomeoAuth.requireAuth("manage_users");

    const permissionLabels = {
      access_cashier: "شاشة الكاشير",
      edit_prices: "تعديل الأسعار",
      view_income_statement: "income statement",
      view_staff_accounting: "staff accounting",
      manage_users: "إدارة المستخدمين"
    };

    const usersList = document.getElementById("usersList");
    const statusBox = document.getElementById("statusBox");

    function showStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
    }

    function resetForm() {
      document.getElementById("displayName").value = "";
      document.getElementById("username").value = "";
      document.getElementById("password").value = "";
      document.querySelectorAll('.permissions input[type="checkbox"]').forEach((input, index) => {
        input.checked = index === 0;
      });
    }

    function selectedPermissions() {
      return Array.from(document.querySelectorAll('.permissions input[type="checkbox"]:checked')).map(input => input.value);
    }

    function renderUsers() {
      usersList.innerHTML = RomeoAuth.getUsers().map(user => `
        <div class="user-card">
          <strong>${user.displayName}</strong>
          <small>@${user.username}</small>
          <p>${user.permissions.map(permission => permissionLabels[permission] || permission).join(" - ")}</p>
          <div class="user-actions">
            <button class="secondary-btn" type="button" onclick="editUser('${user.username}')">تعديل</button>
            <button class="danger-btn" type="button" onclick="removeUser('${user.username}')">حذف</button>
          </div>
        </div>
      `).join("");
    }

    function saveUser() {
      const displayName = document.getElementById("displayName").value.trim();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const permissions = selectedPermissions();
      const existing = RomeoAuth.getUsers().find(user => user.username === username);

      const result = existing
        ? RomeoAuth.updateUser(username, {
            displayName,
            password: password || existing.password,
            permissions
          })
        : RomeoAuth.createUser({
            displayName,
            username,
            password,
            permissions
          });

      if (!result.success) {
        showStatus(result.message, "error");
        return;
      }

      showStatus(existing ? "تم تعديل المستخدم بنجاح." : "تم إضافة المستخدم بنجاح.", "success");
      resetForm();
      renderUsers();
    }

    window.editUser = username => {
      const user = RomeoAuth.getUsers().find(item => item.username === username);
      if (!user) {
        return;
      }

      document.getElementById("displayName").value = user.displayName;
      document.getElementById("username").value = user.username;
      document.getElementById("password").value = user.password;
      document.querySelectorAll('.permissions input[type="checkbox"]').forEach(input => {
        input.checked = user.permissions.includes(input.value);
      });
      showStatus(`أنت الآن تعدل المستخدم ${user.username}`, "success");
    };

    window.removeUser = username => {
      if (!window.confirm(`هل تريد حذف المستخدم ${username}؟`)) {
        return;
      }

      const result = RomeoAuth.deleteUser(username);
      if (!result.success) {
        showStatus(result.message, "error");
        return;
      }

      showStatus("تم حذف المستخدم بنجاح.", "success");
      renderUsers();
    };

    const menuToggle = document.getElementById("menuToggle");
    const sidebar = document.getElementById("sidebar");
    const sidebarOverlay = document.getElementById("sidebarOverlay");

    function openSidebar() {
      sidebar.classList.add("active");
      sidebarOverlay.classList.add("active");
    }

    function closeSidebar() {
      sidebar.classList.remove("active");
      sidebarOverlay.classList.remove("active");
    }

    document.querySelectorAll(".sidebar-link[data-permission]").forEach(link => {
      if (!RomeoAuth.hasPermission(link.dataset.permission)) {
        link.style.display = "none";
      }
    });

    document.querySelectorAll(".sidebar-link[data-href]").forEach(link => {
      link.addEventListener("click", () => {
        window.location.href = link.dataset.href;
      });
    });

    document.getElementById("saveUserBtn").addEventListener("click", saveUser);
    document.getElementById("resetFormBtn").addEventListener("click", resetForm);
    document.getElementById("logoutBtn").addEventListener("click", () => RomeoAuth.logout());
    menuToggle.addEventListener("click", openSidebar);
    sidebarOverlay.addEventListener("click", closeSidebar);

    renderUsers();
    resetForm();
  </script>
</body>
</html>
