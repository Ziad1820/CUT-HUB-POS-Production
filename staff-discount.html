<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">

    <link rel="stylesheet" href="shared.css">
<title>Staff Discount - ROMEO BARBERSHOP</title>
  <style>
    :root{--ink:#2a2118;--muted:#77695c;--accent-dark:#8c642e;--shadow:0 18px 40px rgba(76,54,28,.14)}*{box-sizing:border-box}
    body{margin:0;font-family:"Segoe UI",Tahoma,sans-serif;background:radial-gradient(circle at top right, rgba(183,134,63,.18), transparent 28%), linear-gradient(135deg, #f8f2e8 0%, #f0e4d0 100%);color:var(--ink)}
    .app{min-height:100vh;padding:24px}
    .header{position:relative;background:linear-gradient(135deg,#24180d,#5f4524);color:#ffffff;border-radius:24px;padding:24px;box-shadow:var(--shadow);margin-bottom:24px;text-align:center}
    .header-menu{position:absolute;top:24px;left:24px;z-index:20}
    .menu-toggle{border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;width:48px;height:48px;border-radius:14px;cursor:pointer;font-size:28px;line-height:1}
    .panel{background:rgba(255,255,255,.95);border:1px solid rgba(229,213,190,.8);border-radius:24px;box-shadow:var(--shadow);padding:24px}
    .panel h2{margin:0 0 10px}.panel p{margin:0;color:var(--muted);line-height:1.8}
    .sidebar-overlay{position:fixed;inset:0;background:rgba(34,23,12,0.34);display:none;z-index:999}
    .sidebar-overlay.active{display:block}
    .sidebar{position:fixed;top:0;left:-320px;width:min(320px,85vw);height:100vh;background:#fffaf2;border-right:1px solid rgba(229,213,190,.8);box-shadow:var(--shadow);padding:24px 18px;z-index:1000;transition:left .2s ease;display:flex;flex-direction:column;gap:12px;overflow-y:auto}
    .sidebar.active{left:0}
    .sidebar h3{margin:0 0 8px;color:var(--accent-dark);font-size:22px;text-align:left;direction:ltr}
    .sidebar-link,.sidebar button{width:100%;border:none;border-radius:16px;padding:14px 16px;background:#ead9bd;color:var(--ink);text-align:left;direction:ltr;font-size:16px;font-weight:800;cursor:pointer}
    .sidebar-link.active{background:linear-gradient(135deg,#24180d,#5f4524);color:#fff}
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-menu"><button type="button" class="menu-toggle" id="menuToggle">â‹¯</button></div>
      <h1>ROMEO BARBERSHOP</h1>
    </div>
    <section class="panel">
      <h2>staff Discount</h2>

    </section>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <h3>Menu</h3>
    <button class="sidebar-link" type="button" data-href="index.html">cashier</button>
    <button class="sidebar-link" type="button" data-href="invoices.html">invoices</button>
    <button class="sidebar-link" type="button" data-href="income-statement.html">income statement</button>
    <button class="sidebar-link" type="button" data-href="daily-closing.html" data-permission="view_income_statement">daily closing</button>
    <button class="sidebar-link" type="button" data-href="data-analysis.html" data-permission="view_income_statement">DATA ANALYSIS</button>
      <button class="sidebar-link" type="button" data-href="activity-log.html" data-permission="manage_users">Activity Log</button>
    <button class="sidebar-link" type="button" data-href="staff-accounting.html">staff accounting</button>
    <button class="sidebar-link" type="button" data-href="system-access.html">system access</button>
    <button class="sidebar-link" type="button" data-href="withdrawals.html">Withdrawals</button>
    <button class="sidebar-link" type="button" data-href="expenses.html">Expenses</button>
    <button class="sidebar-link" type="button" data-href="enventory.html">Enventory</button>

  <script src="./text-fix.js"></script>
  <script src="./api.js"></script>
  <script src="./auth.js"></script>
  <script src="./layout.js"></script>
  <script>
    RomeoAuth.requireAuth();
    const menuToggle=document.getElementById("menuToggle");
    const sidebar=document.getElementById("sidebar");
    const sidebarOverlay=document.getElementById("sidebarOverlay");
    menuToggle.addEventListener("click",()=>{sidebar.classList.add("active");sidebarOverlay.classList.add("active")});
    sidebarOverlay.addEventListener("click",()=>{sidebar.classList.remove("active");sidebarOverlay.classList.remove("active")});
    document.querySelectorAll(".sidebar-link[data-href]").forEach(link=>link.addEventListener("click",()=>{window.location.href=link.dataset.href}));
    document.getElementById("logoutBtn").addEventListener("click",()=>RomeoAuth.logout());
  </script>
  <script src="keyboard-navigation.js"></script>
  <script src="language.js"></script>

</html>
