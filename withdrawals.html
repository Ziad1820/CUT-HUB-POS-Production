<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Withdrawals - ROMEO BARBERSHOP</title>
  <style>
    :root {
      --ink: #2a2118;
      --muted: #77695c;
      --accent-dark: #8c642e;
      --accent: #b7863f;
      --surface: rgba(255,255,255,.96);
      --line: rgba(229,213,190,.8);
      --shadow: 0 18px 40px rgba(76,54,28,.14);
      --danger: #ba3a2c;
      --success: #18794e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(183,134,63,0.18), transparent 28%),
        linear-gradient(135deg, #f8f2e8 0%, #f0e4d0 100%);
      color: var(--ink);
    }

    .app { min-height: 100vh; padding: 24px; }

    .header {
      position: relative;
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: #ffffff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      text-align: center;
    }

    .header-menu {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 20;
    }

    .menu-toggle {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: #fff;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 28px;
      line-height: 1;
      transition: transform .18s ease;
    }

    .menu-toggle:hover,
    .action-btn:hover,
    .employee-card:hover,
    .history-item:hover,
    .summary-card:hover {
      transform: translateY(-3px);
    }

    .page-grid {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .panel,
    .summary-card {
      background: var(--surface);
      border: 1px solid rgba(229,213,190,.8);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .panel { padding: 20px; }

    .left-panel {
      display: grid;
      gap: 16px;
      position: sticky;
      top: 20px;
    }

    .search-box,
    .field input,
    .field textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px 15px;
      background: #fffaf2;
      color: var(--ink);
      font-size: 15px;
      font-family: inherit;
    }

    .field textarea {
      min-height: 110px;
      resize: vertical;
    }

    .search-box:focus,
    .field input:focus,
    .field textarea:focus {
      outline: none;
      border-color: #2a2118;
      box-shadow: 0 0 0 3px rgba(183,134,63,.16);
    }

    .employee-list {
      display: grid;
      gap: 10px;
      max-height: 66vh;
      overflow-y: auto;
      padding-left: 6px;
    }

    .employee-card {
      border: 1px solid transparent;
      background: #fffaf2;
      border-radius: 18px;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
      text-align: right;
    }

    .employee-card.active {
      border-color: rgba(183,134,63,0.44);
      background: linear-gradient(135deg, rgba(183,134,63,0.16), rgba(255,255,255,.94));
    }

    .employee-card strong {
      display: block;
      font-size: 17px;
      margin-bottom: 4px;
    }

    .employee-meta {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .main-panel {
      display: grid;
      gap: 18px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .hero h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .hero-badge {
      min-width: 130px;
      text-align: center;
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: white;
      padding: 16px 20px;
      border-radius: 20px;
      font-weight: 900;
      font-size: 26px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .summary-card {
      padding: 18px;
      transition: transform .18s ease;
    }

    .summary-card span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .summary-card strong {
      font-size: 30px;
    }

    .summary-card.total strong { color: #2a2118; }
    .summary-card.count strong { color: #2a2118; }

    .editor-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-btn {
      border: none;
      border-radius: 16px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .18s ease;
    }

    .action-btn.primary {
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: white;
    }

    .action-btn.soft {
      background: #ead9bd;
      color: var(--ink);
    }

    .history-list {
      display: grid;
      gap: 12px;
    }

    .history-item {
      background: #fffaf2;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      display: grid;
      gap: 10px;
      transition: transform .18s ease;
    }

    .history-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .history-amount {
      font-size: 24px;
      font-weight: 900;
      color: #2a2118;
    }

    .history-meta {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .history-note {
      color: var(--ink);
      line-height: 1.7;
    }

    .history-empty {
      padding: 26px;
      text-align: center;
      color: var(--muted);
      background: #fffaf2;
      border: 1px dashed var(--line);
      border-radius: 20px;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(34,23,12,.34);
      display: none;
      z-index: 999;
    }

    .sidebar-overlay.active { display: block; }

    .sidebar {
      position: fixed;
      top: 0;
      left: -320px;
      width: min(320px,85vw);
      height: 100vh;
      background: #fffaf2;
      border-right: 1px solid rgba(229,213,190,.8);
      box-shadow: var(--shadow);
      padding: 24px 18px;
      z-index: 1000;
      transition: left .2s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .sidebar.active { left: 0; }

    .sidebar h3 {
      margin: 0 0 8px;
      color: #2a2118;
      font-size: 22px;
      text-align: left;
      direction: ltr;
    }

    .sidebar-link,
    .sidebar button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      background: #ead9bd;
      color: var(--ink);
      text-align: left;
      direction: ltr;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .sidebar-link.active {
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: white;
    }

    @media (max-width: 1180px) {
      .page-grid,
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .left-panel {
        position: static;
      }
    }

    @media (max-width: 860px) {
      .editor-grid {
        grid-template-columns: 1fr;
      }

      .hero,
      .history-top {
        flex-direction: column;
        align-items: stretch;
      }

      .header-menu {
        position: static;
        width: 100%;
        margin-bottom: 16px;
      }

      .app { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-menu">
        <button type="button" class="menu-toggle" id="menuToggle">⋯</button>
      </div>
      <h1>ROMEO BARBERSHOP</h1>
    </div>

    <div class="page-grid">
      <aside class="left-panel">
        <section class="panel">
          <input class="search-box" id="searchInput" type="text" placeholder="Search employee">
        </section>

        <section class="employee-list" id="employeeList"></section>
      </aside>

      <main class="main-panel">
        <section class="panel hero">
          <div>
            <h2 id="employeeTitle">Select Employee</h2>
            <p id="employeeSubtitle">اختار موظف وسجل السحب بالمبلغ والتاريخ والملاحظة، وكل العمليات هتظهر في السجل تحت.</p>
          </div>
          <div class="hero-badge" id="employeeCode">--</div>
        </section>

        <section class="summary-grid">
          <article class="summary-card total">
            <span>Employee Withdrawals</span>
            <strong id="employeeWithdrawals">0</strong>
          </article>
          <article class="summary-card count">
            <span>Employee Records</span>
            <strong id="employeeRecords">0</strong>
          </article>
          <article class="summary-card total">
            <span>Total Withdrawals</span>
            <strong id="allWithdrawals">0</strong>
          </article>
          <article class="summary-card count">
            <span>Total Records</span>
            <strong id="allRecords">0</strong>
          </article>
        </section>

        <section class="panel">
          <div class="editor-grid">
            <div class="field">
              <label for="withdrawAmount">Amount</label>
              <input id="withdrawAmount" type="number" min="0" step="0.01" placeholder="0">
            </div>
            <div class="field">
              <label for="withdrawDate">Date</label>
              <input id="withdrawDate" type="date">
            </div>
            <div class="field full">
              <label for="withdrawNote">Note</label>
              <textarea id="withdrawNote" placeholder="اكتب سبب السحب أو ملاحظات إضافية"></textarea>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="action-row">
            <button type="button" class="action-btn primary" id="saveBtn">Add Withdrawal</button>
            <button type="button" class="action-btn soft" id="clearBtn">Clear Form</button>
          </div>
        </section>

        <section class="panel">
          <div class="history-list" id="historyList"></div>
        </section>
      </main>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <h3>Menu</h3>
    <button class="sidebar-link" type="button" data-href="index.html" data-permission="access_cashier">cashier</button>
    <button class="sidebar-link" type="button" data-href="income-statement.html" data-permission="view_income_statement">income statement</button>
    <button class="sidebar-link" type="button" data-href="staff-accounting.html" data-permission="view_staff_accounting">staff accounting</button>
    <button class="sidebar-link" type="button" data-href="system-access.html" data-permission="manage_users">system access</button>
    <button class="sidebar-link active" type="button">Withdrawals</button>
    <button class="sidebar-link" type="button" data-href="expenses.html">Expenses</button>
    <button class="sidebar-link" type="button" data-href="enventory.html">Enventory</button>
    <button class="sidebar-link" type="button" data-href="staff-discount.html">staff Discount</button>
    <button class="sidebar-link" type="button" data-href="attendance.html">Attendance</button>
    <button class="sidebar-link" type="button" data-href="bookings.html">Bookings</button>
    <button class="sidebar-link" type="button" data-href="customer-data.html">Customer Data</button>
    <button type="button" id="logoutBtn">Logout</button>
  </aside>

  <script src="./text-fix.js"></script>
  <script>
    const STAFF_SOURCE_KEY = "romeo-pos-staff-accounting-v2";
    const WITHDRAWALS_KEY = "romeo-pos-withdrawals";
  </script>
  <script src="./auth.js"></script>
  <script>
    RomeoAuth.requireAuth();

    const API_URL = "https://script.google.com/macros/s/AKfycbwSIX3p41ceJNBjxhon2BIDsDMpJRrgurlLXYBmQa_a5ENtY8Sr3hRW3MOMMNBJ_msN/exec";
    const elements = {
      searchInput: document.getElementById("searchInput"),
      employeeList: document.getElementById("employeeList"),
      employeeTitle: document.getElementById("employeeTitle"),
      employeeSubtitle: document.getElementById("employeeSubtitle"),
      employeeCode: document.getElementById("employeeCode"),
      employeeWithdrawals: document.getElementById("employeeWithdrawals"),
      employeeRecords: document.getElementById("employeeRecords"),
      allWithdrawals: document.getElementById("allWithdrawals"),
      allRecords: document.getElementById("allRecords"),
      withdrawAmount: document.getElementById("withdrawAmount"),
      withdrawDate: document.getElementById("withdrawDate"),
      withdrawNote: document.getElementById("withdrawNote"),
      historyList: document.getElementById("historyList")
    };

    const menuToggle = document.getElementById("menuToggle");
    const sidebar = document.getElementById("sidebar");
    const sidebarOverlay = document.getElementById("sidebarOverlay");
    const saveBtn = document.getElementById("saveBtn");
    const clearBtn = document.getElementById("clearBtn");

    function formatMoney(value) {
      return Number(value || 0).toLocaleString("en-US");
    }

    function getStaff() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STAFF_SOURCE_KEY) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    function getWithdrawals() {
      try {
        const parsed = JSON.parse(localStorage.getItem(WITHDRAWALS_KEY) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    let staffList = getStaff();
    let withdrawalList = getWithdrawals();
    let selectedId = staffList[0]?.id || null;

    if (!elements.withdrawDate.value) {
      elements.withdrawDate.value = new Date().toISOString().slice(0, 10);
    }

    function saveWithdrawals() {
      localStorage.setItem(WITHDRAWALS_KEY, JSON.stringify(withdrawalList));
    }

    async function saveWithdrawalToSheet(withdrawal) {
      const response = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "withdrawal",
          withdrawalId: withdrawal.id,
          staffName: withdrawal.staffName,
          staffCode: withdrawal.staffCode,
          amount: withdrawal.amount,
          note: withdrawal.note,
          date: withdrawal.date
        })
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(errorText || `Failed to save withdrawal (${response.status})`);
      }

      const data = await response.json();
      if (data.status !== "success") {
        throw new Error(data.message || "Failed to save withdrawal");
      }
    }

    async function deleteWithdrawalFromSheet(withdrawal) {
      const response = await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "deleteWithdrawal",
          withdrawalId: withdrawal.id,
          staffName: withdrawal.staffName,
          amount: withdrawal.amount,
          note: withdrawal.note,
          date: withdrawal.date
        })
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(errorText || `Failed to delete withdrawal (${response.status})`);
      }

      const data = await response.json();
      if (data.status !== "success") {
        throw new Error(data.message || "Failed to delete withdrawal");
      }
    }

    function getSelectedStaff() {
      return staffList.find(staff => staff.id === selectedId) || null;
    }

    function getEmployeeWithdrawals(staffId) {
      return withdrawalList.filter(item => item.staffId === staffId);
    }

    function renderEmployeeList() {
      const query = elements.searchInput.value.trim().toLowerCase();
      const filtered = staffList.filter(staff =>
        !query ||
        String(staff.name || "").toLowerCase().includes(query) ||
        String(staff.code || "").toLowerCase().includes(query)
      );

      elements.employeeList.innerHTML = "";

      filtered.forEach(staff => {
        const total = getEmployeeWithdrawals(staff.id).reduce((sum, item) => sum + Number(item.amount || 0), 0);
        const card = document.createElement("button");
        card.type = "button";
        card.className = `employee-card${staff.id === selectedId ? " active" : ""}`;
        card.innerHTML = `
          <strong>${staff.name}</strong>
          <div class="employee-meta">
            <span>${staff.code}</span>
            <span>${formatMoney(total)}</span>
          </div>
        `;
        card.addEventListener("click", () => {
          selectedId = staff.id;
          renderAll();
        });
        elements.employeeList.appendChild(card);
      });

      if (!filtered.length) {
        elements.employeeList.innerHTML = `<div class="history-empty">No employee found.</div>`;
      }
    }

    function renderHero() {
      const staff = getSelectedStaff();
      if (!staff) {
        elements.employeeTitle.textContent = "No Employee Selected";
        elements.employeeSubtitle.textContent = "افتح صفحة الموظفين أولًا أو أضف موظفًا هناك، ثم ارجع هنا لتسجيل السحوبات.";
        elements.employeeCode.textContent = "--";
        return;
      }

      elements.employeeTitle.textContent = staff.name;
      elements.employeeSubtitle.textContent = `سجل كل السحوبات الخاصة بـ ${staff.name} من هنا، مع التاريخ والملاحظة.`;
      elements.employeeCode.textContent = staff.code;
    }

    function renderSummary() {
      const staff = getSelectedStaff();
      const employeeItems = staff ? getEmployeeWithdrawals(staff.id) : [];
      const employeeTotal = employeeItems.reduce((sum, item) => sum + Number(item.amount || 0), 0);
      const allTotal = withdrawalList.reduce((sum, item) => sum + Number(item.amount || 0), 0);

      elements.employeeWithdrawals.textContent = formatMoney(employeeTotal);
      elements.employeeRecords.textContent = employeeItems.length;
      elements.allWithdrawals.textContent = formatMoney(allTotal);
      elements.allRecords.textContent = withdrawalList.length;
    }

    function renderHistory() {
      const staff = getSelectedStaff();
      const items = staff ? getEmployeeWithdrawals(staff.id) : [];
      const sorted = [...items].sort((a, b) => new Date(b.date) - new Date(a.date));
      elements.historyList.innerHTML = "";

      if (!staff) {
        elements.historyList.innerHTML = `<div class="history-empty">لا يوجد موظف مختار الآن.</div>`;
        return;
      }

      if (!sorted.length) {
        elements.historyList.innerHTML = `<div class="history-empty">لا توجد سحوبات مسجلة لهذا الموظف حتى الآن.</div>`;
        return;
      }

      sorted.forEach(item => {
        const row = document.createElement("article");
        row.className = "history-item";
        row.innerHTML = `
          <div class="history-top">
            <div>
              <div class="history-amount">${formatMoney(item.amount)}</div>
            </div>
            <button type="button" class="action-btn soft" data-delete-id="${item.id}">Delete</button>
          </div>
          <div class="history-meta">
            <span>${staff.name}</span>
            <span>${item.date}</span>
          </div>
          <div class="history-note">${item.note || "No note"}</div>
        `;
        elements.historyList.appendChild(row);
      });
    }

    function renderAll() {
      staffList = getStaff();
      if (!staffList.find(staff => staff.id === selectedId)) {
        selectedId = staffList[0]?.id || null;
      }
      renderEmployeeList();
      renderHero();
      renderSummary();
      renderHistory();
    }

    function clearForm() {
      elements.withdrawAmount.value = "";
      elements.withdrawNote.value = "";
      elements.withdrawDate.value = new Date().toISOString().slice(0, 10);
    }

    async function addWithdrawal() {
      const staff = getSelectedStaff();
      const amount = Number(elements.withdrawAmount.value);

      if (!staff) {
        alert("اختار موظف الأول.");
        return;
      }

      if (!Number.isFinite(amount) || amount <= 0) {
        alert("اكتب مبلغ سحب صحيح.");
        return;
      }

      const withdrawal = {
        id: Date.now(),
        staffId: staff.id,
        staffName: staff.name,
        staffCode: staff.code,
        amount,
        date: elements.withdrawDate.value || new Date().toISOString().slice(0, 10),
        note: elements.withdrawNote.value.trim()
      };

      saveBtn.disabled = true;
      saveBtn.textContent = "Saving...";

      try {
        await saveWithdrawalToSheet(withdrawal);
        withdrawalList.unshift(withdrawal);
        saveWithdrawals();
        clearForm();
        renderAll();
      } catch (error) {
        console.error(error);
        alert(error.message || "تعذر حفظ السحب في الشيت.");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "Add Withdrawal";
      }
    }

    async function deleteWithdrawal(id) {
      const withdrawal = withdrawalList.find(item => item.id === id);
      if (!withdrawal) {
        return;
      }

      try {
        await deleteWithdrawalFromSheet(withdrawal);
        withdrawalList = withdrawalList.filter(item => item.id !== id);
        saveWithdrawals();
        renderAll();
      } catch (error) {
        console.error(error);
        alert(error.message || "تعذر حذف السحب من الشيت.");
      }
    }

    function openSidebar() {
      sidebar.classList.add("active");
      sidebarOverlay.classList.add("active");
    }

    function closeSidebar() {
      sidebar.classList.remove("active");
      sidebarOverlay.classList.remove("active");
    }

    document.querySelectorAll(".sidebar-link[data-permission]").forEach(link => {
      if (!RomeoAuth.hasPermission(link.dataset.permission)) {
        link.style.display = "none";
      }
    });

    document.querySelectorAll(".sidebar-link[data-href]").forEach(link => {
      link.addEventListener("click", () => {
        window.location.href = link.dataset.href;
      });
    });

    elements.searchInput.addEventListener("input", renderEmployeeList);
    saveBtn.addEventListener("click", addWithdrawal);
    clearBtn.addEventListener("click", clearForm);
    elements.historyList.addEventListener("click", async event => {
      const btn = event.target.closest("[data-delete-id]");
      if (!btn) return;
      if (!confirm("تحذف عملية السحب دي؟")) return;
      btn.disabled = true;
      btn.textContent = "Deleting...";
      await deleteWithdrawal(Number(btn.dataset.deleteId));
    });
    menuToggle.addEventListener("click", openSidebar);
    sidebarOverlay.addEventListener("click", closeSidebar);
    document.getElementById("logoutBtn").addEventListener("click", () => RomeoAuth.logout());

    renderAll();
  </script>
</body>
</html>
