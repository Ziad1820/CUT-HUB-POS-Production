<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/shared.css">
<title>Expenses - SALONIX</title>
  <style>
    :root {
      --ink: #2a2118;
      --muted: #77695c;
      --accent-dark: #8c642e;
      --accent: #b7863f;
      --surface: rgba(255,255,255,.96);
      --line: rgba(229,213,190,.8);
      --shadow: 0 18px 40px rgba(76,54,28,.14);
      --danger: #ba3a2c;
      --success: #18794e;
      --warning: #b7863f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(183,134,63,0.18), transparent 28%),
        linear-gradient(135deg, #f8f2e8 0%, #f0e4d0 100%);
      color: var(--ink);
    }

    .app { min-height: 100vh; padding: 24px; }

    .header {
      position: relative;
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: #ffffff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      text-align: center;
    }

    .header-menu {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 20;
    }

    .menu-toggle {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: #fff;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 28px;
      line-height: 1;
      transition: transform .18s ease;
    }

    .menu-toggle:hover,
    .action-btn:hover,
    .category-card:hover,
    .history-item:hover,
    .summary-card:hover {
      transform: translateY(-3px);
    }

    .page-grid {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .panel,
    .summary-card {
      background: var(--surface);
      border: 1px solid rgba(229,213,190,.8);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .panel { padding: 20px; }

    .left-panel {
      display: grid;
      gap: 16px;
      position: sticky;
      top: 20px;
    }

    .search-box,
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px 15px;
      background: #fffaf2;
      color: var(--ink);
      font-size: 15px;
      font-family: inherit;
    }

    .field textarea {
      min-height: 110px;
      resize: vertical;
    }

    .search-box:focus,
    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      outline: none;
      border-color: #2a2118;
      box-shadow: 0 0 0 3px rgba(183,134,63,.16);
    }

    .category-list {
      display: grid;
      gap: 10px;
      max-height: 66vh;
      overflow-y: auto;
      padding-left: 6px;
    }

    .category-card {
      border: 1px solid transparent;
      background: #fffaf2;
      border-radius: 18px;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
      text-align: right;
    }

    .category-card.active {
      border-color: rgba(183,134,63,0.44);
      background: linear-gradient(135deg, rgba(183,134,63,0.16), rgba(255,255,255,.94));
    }

    .category-card strong {
      display: block;
      font-size: 17px;
      margin-bottom: 4px;
    }

    .category-meta {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .main-panel {
      display: grid;
      gap: 18px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .hero h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .hero-badge {
      min-width: 130px;
      text-align: center;
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: white;
      padding: 16px 20px;
      border-radius: 20px;
      font-weight: 900;
      font-size: 22px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .summary-card {
      padding: 18px;
      transition: transform .18s ease;
    }

    .summary-card span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .summary-card strong {
      font-size: 30px;
    }

    .summary-card.total strong { color: #2a2118; }
    .summary-card.count strong { color: #2a2118; }
    .summary-card.average strong { color: #2a2118; }

    .editor-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-btn {
      border: none;
      border-radius: 16px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .18s ease;
    }

    .action-btn.primary {
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: white;
    }

    .action-btn.soft {
      background: #ead9bd;
      color: var(--ink);
    }

    .history-list {
      display: grid;
      gap: 12px;
    }

    .history-item {
      background: #fffaf2;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      display: grid;
      gap: 10px;
      transition: transform .18s ease;
    }

    .history-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .history-amount {
      font-size: 24px;
      font-weight: 900;
      color: #2a2118;
    }

    .history-meta {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .history-note {
      color: var(--ink);
      line-height: 1.7;
    }

    .history-empty {
      padding: 26px;
      text-align: center;
      color: var(--muted);
      background: #fffaf2;
      border: 1px dashed var(--line);
      border-radius: 20px;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(34,23,12,.34);
      display: none;
      z-index: 999;
    }

    .sidebar-overlay.active { display: block; }

    .sidebar {
      position: fixed;
      top: 0;
      left: -320px;
      width: min(320px,85vw);
      height: 100vh;
      background: #fffaf2;
      border-right: 1px solid rgba(229,213,190,.8);
      box-shadow: var(--shadow);
      padding: 24px 18px;
      z-index: 1000;
      transition: left .2s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .sidebar.active { left: 0; }

    .sidebar h3 {
      margin: 0 0 8px;
      color: #2a2118;
      font-size: 22px;
      text-align: left;
      direction: ltr;
    }

    .sidebar-link,
    .sidebar button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      background: #ead9bd;
      color: var(--ink);
      text-align: left;
      direction: ltr;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .sidebar-link.active {
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: white;
    }

    @media (max-width: 1180px) {
      .page-grid,
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .left-panel {
        position: static;
      }
    }

    @media (max-width: 860px) {
      .editor-grid {
        grid-template-columns: 1fr;
      }

      .hero,
      .history-top {
        flex-direction: column;
        align-items: stretch;
      }

      .header-menu {
        position: static;
        width: 100%;
        margin-bottom: 16px;
      }

      .app { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-menu">
        <button type="button" class="menu-toggle" id="menuToggle">...</button>
      </div>
      <div class="brand-lockup">
        <img class="brand-logo" src="../assets/images/salonix-logo.svg" alt="SALONIX logo">
        <h1 class="brand-name">SALONIX</h1>
        <p class="brand-slogan">THE SMART WAY TO RUN YOUR SALON</p>
      </div>
    </div>

    <div class="page-grid">
      <aside class="left-panel">
        <section class="panel">
          <input class="search-box" id="searchInput" type="text" placeholder="ابحث عن تصنيف" data-i18n-placeholder-ar="ابحث عن تصنيف" data-i18n-placeholder-en="Search category">
        </section>

        <section class="category-list" id="categoryList"></section>
      </aside>

      <main class="main-panel">
        <section class="panel hero">
          <div>
            <h2 id="categoryTitle">اختر تصنيف</h2>
            <p id="categorySubtitle">اختار نوع المصروف، ثم سجل المبلغ والتاريخ والملاحظة. كل المصروفات الخاصة بالتصنيف المختار ستظهر في السجل تحت.</p>
          </div>
          <div class="hero-badge" id="categoryCode">EXP</div>
        </section>

        <section class="summary-grid">
          <article class="summary-card total">
            <span data-i18n-ar="مصروفات التصنيف" data-i18n-en="Category Expenses">مصروفات التصنيف</span>
            <strong id="categoryExpenses">0</strong>
          </article>
          <article class="summary-card count">
            <span data-i18n-ar="عمليات التصنيف" data-i18n-en="Category Records">عمليات التصنيف</span>
            <strong id="categoryRecords">0</strong>
          </article>
          <article class="summary-card total">
            <span data-i18n-ar="إجمالي المصروفات" data-i18n-en="Total Expenses">إجمالي المصروفات</span>
            <strong id="allExpenses">0</strong>
          </article>
          <article class="summary-card average">
            <span data-i18n-ar="متوسط المصروف" data-i18n-en="Average Expense">متوسط المصروف</span>
            <strong id="averageExpense">0</strong>
          </article>
        </section>

        <section class="panel">
          <div class="editor-grid">
            <div class="field">
              <label for="expenseAmount" data-i18n-ar="المبلغ" data-i18n-en="Amount">المبلغ</label>
              <input id="expenseAmount" type="number" min="0" step="0.01" placeholder="0">
            </div>
            <div class="field">
              <label for="expenseDate" data-i18n-ar="التاريخ" data-i18n-en="Date">التاريخ</label>
              <input id="expenseDate" type="date">
            </div>
            <div class="field">
              <label for="expenseCategory" data-i18n-ar="التصنيف" data-i18n-en="Category">التصنيف</label>
              <select id="expenseCategory"></select>
            </div>
            <div class="field">
              <label for="expenseTitle" data-i18n-ar="العنوان" data-i18n-en="Title">العنوان</label>
              <input id="expenseTitle" type="text" placeholder="كهرباء / إيجار / مستلزمات" data-i18n-placeholder-ar="كهرباء / إيجار / مستلزمات" data-i18n-placeholder-en="Electricity / Rent / Supplies">
            </div>
            <div class="field full">
              <label for="expenseNote" data-i18n-ar="الملاحظة" data-i18n-en="Note">الملاحظة</label>
              <textarea id="expenseNote" placeholder="اكتب تفاصيل المصروف أو أي ملاحظة إضافية" data-i18n-placeholder-ar="اكتب تفاصيل المصروف أو أي ملاحظة إضافية" data-i18n-placeholder-en="Write expense details or any extra note"></textarea>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="action-row">
            <button type="button" class="action-btn primary" id="saveBtn" data-i18n-ar="إضافة مصروف" data-i18n-en="Add Expense">إضافة مصروف</button>
            <button type="button" class="action-btn soft" id="clearBtn" data-i18n-ar="مسح النموذج" data-i18n-en="Clear Form">مسح النموذج</button>
          </div>
        </section>

        <section class="panel">
          <div class="history-list" id="historyList"></div>
        </section>
      </main>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <h3>Menu</h3>
    <button class="sidebar-link" type="button" data-href="cashier.html" data-permission="access_cashier">cashier</button>
    <button class="sidebar-link" type="button" data-href="invoices.html">invoices</button>
    <button class="sidebar-link" type="button" data-href="income-statement.html" data-permission="view_income_statement">income statement</button>
    <button class="sidebar-link" type="button" data-href="daily-closing.html" data-permission="view_income_statement">daily closing</button>
    <button class="sidebar-link" type="button" data-href="data-analysis.html" data-permission="view_income_statement">DATA ANALYSIS</button>
      <button class="sidebar-link" type="button" data-href="activity-log.html" data-permission="manage_users">Activity Log</button>
    <button class="sidebar-link" type="button" data-href="staff-accounting.html" data-permission="view_staff_accounting">staff accounting</button>
    <button class="sidebar-link" type="button" data-href="system-access.html" data-permission="manage_users">system access</button>
    <button class="sidebar-link" type="button" data-href="withdrawals.html">Withdrawals</button>
    <button class="sidebar-link active" type="button">Expenses</button>
    <button class="sidebar-link" type="button" data-href="enventory.html">Enventory</button>
    <button class="sidebar-link" type="button" data-href="staff-discount.html">staff Discount</button>
    <button class="sidebar-link" type="button" data-href="attendance.html">Attendance</button>
    <button class="sidebar-link" type="button" data-href="bookings.html">Bookings</button>
    <button type="button" id="logoutBtn">Logout</button>
  </aside>

  <script src="../assets/js/utils/text-fix.js"></script>

  <script src="../assets/js/core/api.js"></script>
  <script src="../assets/js/core/auth.js"></script>
  <script src="../assets/js/utils/layout.js"></script>
  <script src="../assets/js/pages/expenses.js"></script>

  <script src="../assets/js/utils/keyboard-navigation.js"></script>
  <script src="../assets/js/utils/language.js"></script>
</body>
</html>
