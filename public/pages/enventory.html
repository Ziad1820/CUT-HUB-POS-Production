<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/shared.css">
<title>Enventory - SALONIX</title>
  <style>
    :root {
      --ink: #2a2118;
      --muted: #77695c;
      --accent-dark: #8c642e;
      --accent: #b7863f;
      --surface: rgba(255,255,255,.96);
      --line: rgba(229,213,190,.8);
      --shadow: 0 18px 40px rgba(76,54,28,.14);
      --danger: #ba3a2c;
      --success: #18794e;
      --warning: #b7863f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(183,134,63,0.18), transparent 28%),
        linear-gradient(135deg, #f8f2e8 0%, #f0e4d0 100%);
      color: var(--ink);
    }

    .app { min-height: 100vh; padding: 24px; }

    .header {
      position: relative;
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: #ffffff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      text-align: center;
    }

    .header-menu {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 20;
    }

    .menu-toggle {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: #fff;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 28px;
      line-height: 1;
      transition: transform .18s ease;
    }

    .menu-toggle:hover,
    .action-btn:hover,
    .item-card:hover,
    .history-item:hover,
    .summary-card:hover {
      transform: translateY(-3px);
    }

    .page-grid {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .panel,
    .summary-card {
      background: var(--surface);
      border: 1px solid rgba(229,213,190,.8);
      border-radius: 24px;
      box-shadow: var(--shadow);
    }

    .panel { padding: 20px; }

    .left-panel {
      display: grid;
      gap: 16px;
      position: sticky;
      top: 20px;
    }

    .search-box,
    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px 15px;
      background: #fffaf2;
      color: var(--ink);
      font-size: 15px;
      font-family: inherit;
    }

    .field textarea {
      min-height: 100px;
      resize: vertical;
    }

    .search-box:focus,
    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      outline: none;
      border-color: #2a2118;
      box-shadow: 0 0 0 3px rgba(183,134,63,.16);
    }

    .item-list {
      display: grid;
      gap: 10px;
      max-height: 66vh;
      overflow-y: auto;
      padding-left: 6px;
    }

    .item-card {
      border: 1px solid transparent;
      background: #fffaf2;
      border-radius: 18px;
      padding: 14px 16px;
      cursor: pointer;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
      text-align: right;
    }

    .item-card.active {
      border-color: rgba(183,134,63,0.44);
      background: linear-gradient(135deg, rgba(183,134,63,0.16), rgba(255,255,255,.94));
    }

    .item-card.low {
      border-color: rgba(183,134,63,0.28);
      background: linear-gradient(135deg, rgba(183,134,63,.08), rgba(255,255,255,.96));
    }

    .item-card strong {
      display: block;
      font-size: 17px;
      margin-bottom: 4px;
    }

    .item-meta {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }

    .main-panel {
      display: grid;
      gap: 18px;
    }

    .hero {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .hero h2 {
      margin: 0 0 8px;
      font-size: 28px;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .hero-badge {
      min-width: 130px;
      text-align: center;
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: white;
      padding: 16px 20px;
      border-radius: 20px;
      font-weight: 900;
      font-size: 22px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
    }

    .summary-card {
      padding: 18px;
      transition: transform .18s ease;
    }

    .summary-card span {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .summary-card strong {
      font-size: 30px;
    }

    .summary-card.low strong { color: #2a2118; }
    .summary-card.good strong { color: #2a2118; }
    .summary-card.value strong { color: #2a2118; }

    .editor-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    .field label {
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .action-btn {
      border: none;
      border-radius: 16px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      transition: transform .18s ease;
    }

    .action-btn.primary {
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: white;
    }

    .action-btn.soft {
      background: #ead9bd;
      color: var(--ink);
    }

    .action-btn.danger {
      background: linear-gradient(135deg, var(--danger), #8f281f);
      color: white;
      border: none;
    }

    .history-list {
      display: grid;
      gap: 12px;
    }

    .history-item {
      background: #fffaf2;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      display: grid;
      gap: 10px;
      transition: transform .18s ease;
    }

    .history-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .history-amount {
      font-size: 24px;
      font-weight: 900;
    }

    .history-amount.in { color: var(--success); }
    .history-amount.out { color: var(--danger); }

    .history-meta {
      color: var(--muted);
      font-size: 13px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .history-note {
      color: var(--ink);
      line-height: 1.7;
    }

    .history-empty {
      padding: 26px;
      text-align: center;
      color: var(--muted);
      background: #fffaf2;
      border: 1px dashed var(--line);
      border-radius: 20px;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(34,23,12,.34);
      display: none;
      z-index: 999;
    }

    .sidebar-overlay.active { display: block; }

    .sidebar {
      position: fixed;
      top: 0;
      left: -320px;
      width: min(320px,85vw);
      height: 100vh;
      background: #fffaf2;
      border-right: 1px solid rgba(229,213,190,.8);
      box-shadow: var(--shadow);
      padding: 24px 18px;
      z-index: 1000;
      transition: left .2s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .sidebar.active { left: 0; }

    .sidebar h3 {
      margin: 0 0 8px;
      color: #2a2118;
      font-size: 22px;
      text-align: left;
      direction: ltr;
    }

    .sidebar-link,
    .sidebar button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      background: #ead9bd;
      color: var(--ink);
      text-align: left;
      direction: ltr;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .sidebar-link.active {
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: white;
    }

    body[data-language="en"] .header-menu {
      left: auto;
      right: 24px;
    }

    body[data-language="en"] .sidebar {
      left: auto;
      right: -320px;
      border-right: none;
      border-left: 1px solid rgba(229,213,190,.8);
      transition: right .2s ease;
    }

    body[data-language="en"] .sidebar.active {
      right: 0;
    }

    body[data-language="en"] .item-card,
    body[data-language="en"] .field,
    body[data-language="en"] .hero,
    body[data-language="en"] .history-item,
    body[data-language="en"] .summary-card {
      text-align: left;
    }

    body[data-language="en"] .item-list {
      padding-left: 0;
      padding-right: 6px;
    }

    @media (max-width: 1180px) {
      .page-grid,
      .summary-grid {
        grid-template-columns: 1fr;
      }

      .left-panel { position: static; }
    }

    @media (max-width: 860px) {
      .editor-grid {
        grid-template-columns: 1fr;
      }

      .hero,
      .history-top {
        flex-direction: column;
        align-items: stretch;
      }

      .header-menu {
        position: static;
        width: 100%;
        margin-bottom: 16px;
      }

      .app { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-menu">
        <button type="button" class="menu-toggle" id="menuToggle">...</button>
      </div>
      <div class="brand-lockup">
        <img class="brand-logo" src="../assets/images/salonix-logo.svg" alt="SALONIX logo">
        <h1 class="brand-name">SALONIX</h1>
        <p class="brand-slogan">THE SMART WAY TO RUN YOUR SALON</p>
      </div>
    </div>

    <div class="page-grid">
      <aside class="left-panel">
        <section class="panel">
          <input class="search-box" id="searchInput" type="text" placeholder="ابحث عن صنف" data-i18n-placeholder-ar="ابحث عن صنف" data-i18n-placeholder-en="Search item">
        </section>

        <section class="panel">
          <div class="action-row">
            <button type="button" class="action-btn primary" id="addItemBtn" data-i18n-ar="إضافة صنف" data-i18n-en="Add Item">إضافة صنف</button>
            <button type="button" class="action-btn soft" id="resetBtn" data-i18n-ar="إعادة ضبط الأصناف" data-i18n-en="Reset Items">إعادة ضبط الأصناف</button>
          </div>
        </section>

        <section class="item-list" id="itemList"></section>
      </aside>

      <main class="main-panel">
        <section class="panel hero">
          <div>
            <h2 id="itemTitle">اختر صنف</h2>
            <p id="itemSubtitle">اختر صنف من القائمة، وعدل الكمية والحد الأدنى وسعر الشراء أو سجل حركة دخول وخروج للمخزون.</p>
          </div>
          <div class="hero-badge" id="itemCode">INV</div>
        </section>

        <section class="summary-grid">
          <article class="summary-card">
            <span data-i18n-ar="المخزون الحالي" data-i18n-en="Current Stock">المخزون الحالي</span>
            <strong id="currentStock">0</strong>
          </article>
          <article class="summary-card low">
            <span data-i18n-ar="الحد الأدنى" data-i18n-en="Minimum Stock">الحد الأدنى</span>
            <strong id="minimumStock">0</strong>
          </article>
          <article class="summary-card value">
            <span data-i18n-ar="سعر الشراء" data-i18n-en="Buy Price">سعر الشراء</span>
            <strong id="buyPrice">0</strong>
          </article>
          <article class="summary-card good">
            <span data-i18n-ar="أصناف قليلة المخزون" data-i18n-en="Low Stock Items">أصناف قليلة المخزون</span>
            <strong id="lowStockCount">0</strong>
          </article>
        </section>

        <section class="panel">
          <div class="editor-grid">
            <div class="field">
              <label for="itemName" data-i18n-ar="اسم الصنف" data-i18n-en="Item Name">اسم الصنف</label>
              <input id="itemName" type="text">
            </div>
            <div class="field">
              <label for="itemCodeInput" data-i18n-ar="كود الصنف" data-i18n-en="Item Code">كود الصنف</label>
              <input id="itemCodeInput" type="text">
            </div>
            <div class="field">
              <label for="itemCategory" data-i18n-ar="التصنيف" data-i18n-en="Category">التصنيف</label>
              <input id="itemCategory" type="text" placeholder="شعر / ذقن / بشرة / بيع" data-i18n-placeholder-ar="شعر / ذقن / بشرة / بيع" data-i18n-placeholder-en="Hair / Beard / Skin / Retail">
            </div>
            <div class="field">
              <label for="itemQuantity" data-i18n-ar="الكمية الحالية" data-i18n-en="Current Quantity">الكمية الحالية</label>
              <input id="itemQuantity" type="number" min="0">
            </div>
            <div class="field">
              <label for="itemMinimum" data-i18n-ar="الحد الأدنى للمخزون" data-i18n-en="Minimum Stock">الحد الأدنى للمخزون</label>
              <input id="itemMinimum" type="number" min="0">
            </div>
            <div class="field">
              <label for="itemBuyPrice" data-i18n-ar="سعر الشراء" data-i18n-en="Buy Price">سعر الشراء</label>
              <input id="itemBuyPrice" type="number" min="0" step="0.01">
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="action-row">
            <button type="button" class="action-btn primary" id="saveItemBtn" data-i18n-ar="حفظ الصنف" data-i18n-en="Save Item">حفظ الصنف</button>
            <button type="button" class="action-btn danger" id="deleteItemBtn" data-i18n-ar="حذف الصنف" data-i18n-en="Delete Item">حذف الصنف</button>
          </div>
        </section>

        <section class="panel">
          <div class="editor-grid">
            <div class="field">
              <label for="movementType" data-i18n-ar="نوع الحركة" data-i18n-en="Movement Type">نوع الحركة</label>
              <select id="movementType">
                <option value="in" data-i18n-ar="دخول مخزون" data-i18n-en="Stock In">دخول مخزون</option>
                <option value="out" data-i18n-ar="خروج مخزون" data-i18n-en="Stock Out">خروج مخزون</option>
              </select>
            </div>
            <div class="field">
              <label for="movementQuantity" data-i18n-ar="الكمية" data-i18n-en="Quantity">الكمية</label>
              <input id="movementQuantity" type="number" min="1" step="1">
            </div>
            <div class="field">
              <label for="movementDate" data-i18n-ar="التاريخ" data-i18n-en="Date">التاريخ</label>
              <input id="movementDate" type="date">
            </div>
            <div class="field">
              <label for="movementReason" data-i18n-ar="السبب" data-i18n-en="Reason">السبب</label>
              <input id="movementReason" type="text" placeholder="شراء / بيع / هالك / تعديل" data-i18n-placeholder-ar="شراء / بيع / هالك / تعديل" data-i18n-placeholder-en="Purchase / Sale / Waste / Adjustment">
            </div>
            <div class="field full">
              <label for="movementNote" data-i18n-ar="ملاحظة" data-i18n-en="Note">ملاحظة</label>
              <textarea id="movementNote" placeholder="اكتب ملاحظات عن الحركة" data-i18n-placeholder-ar="اكتب ملاحظات عن الحركة" data-i18n-placeholder-en="Write notes about the movement"></textarea>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="action-row">
            <button type="button" class="action-btn primary" id="addMovementBtn" data-i18n-ar="إضافة حركة" data-i18n-en="Add Movement">إضافة حركة</button>
            <button type="button" class="action-btn soft" id="clearMovementBtn" data-i18n-ar="مسح الحركة" data-i18n-en="Clear Movement">مسح الحركة</button>
          </div>
        </section>

        <section class="panel">
          <div class="history-list" id="historyList"></div>
        </section>
      </main>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <h3>Menu</h3>
    <button class="sidebar-link" type="button" data-href="cashier.html" data-permission="access_cashier">cashier</button>
    <button class="sidebar-link" type="button" data-href="invoices.html">invoices</button>
    <button class="sidebar-link" type="button" data-href="income-statement.html" data-permission="view_income_statement">income statement</button>
    <button class="sidebar-link" type="button" data-href="daily-closing.html" data-permission="view_income_statement">daily closing</button>
    <button class="sidebar-link" type="button" data-href="data-analysis.html" data-permission="view_income_statement">DATA ANALYSIS</button>
      <button class="sidebar-link" type="button" data-href="activity-log.html" data-permission="manage_users">Activity Log</button>
    <button class="sidebar-link" type="button" data-href="staff-accounting.html" data-permission="view_staff_accounting">staff accounting</button>
    <button class="sidebar-link" type="button" data-href="system-access.html" data-permission="manage_users">system access</button>
    <button class="sidebar-link" type="button" data-href="withdrawals.html">Withdrawals</button>
    <button class="sidebar-link" type="button" data-href="expenses.html">Expenses</button>
    <button class="sidebar-link active" type="button">Enventory</button>
    <button class="sidebar-link" type="button" data-href="staff-discount.html">staff Discount</button>
    <button class="sidebar-link" type="button" data-href="attendance.html">Attendance</button>
    <button class="sidebar-link" type="button" data-href="bookings.html">Bookings</button>
    <button type="button" id="logoutBtn">Logout</button>
  </aside>

  <script src="../assets/js/utils/text-fix.js"></script>
  <script>
    const INVENTORY_KEY = "romeo-pos-inventory";
    const INVENTORY_LOG_KEY = "romeo-pos-inventory-log";
    const DEFAULT_ITEMS = [
      { id: 1, name: "Hair Wax", arName: "واكس شعر", code: "INV01", category: "Retail", arCategory: "بيع", quantity: 12, minimum: 5, buyPrice: 80 },
      { id: 2, name: "Shampoo", arName: "شامبو", code: "INV02", category: "Hair", arCategory: "شعر", quantity: 8, minimum: 4, buyPrice: 120 },
      { id: 3, name: "Beard Oil", arName: "زيت ذقن", code: "INV03", category: "Beard", arCategory: "ذقن", quantity: 3, minimum: 5, buyPrice: 90 },
      { id: 4, name: "Face Mask", arName: "ماسك وجه", code: "INV04", category: "Skin", arCategory: "بشرة", quantity: 10, minimum: 6, buyPrice: 45 }
    ];
  </script>
  <script src="../assets/js/core/api.js"></script>
  <script src="../assets/js/core/auth.js"></script>
  <script src="../assets/js/utils/layout.js"></script>
  <script>
    RomeoAuth.requireAuth("view_inventory");

    const elements = {
      searchInput: document.getElementById("searchInput"),
      itemList: document.getElementById("itemList"),
      itemTitle: document.getElementById("itemTitle"),
      itemSubtitle: document.getElementById("itemSubtitle"),
      itemCode: document.getElementById("itemCode"),
      currentStock: document.getElementById("currentStock"),
      minimumStock: document.getElementById("minimumStock"),
      buyPrice: document.getElementById("buyPrice"),
      lowStockCount: document.getElementById("lowStockCount"),
      itemName: document.getElementById("itemName"),
      itemCodeInput: document.getElementById("itemCodeInput"),
      itemCategory: document.getElementById("itemCategory"),
      itemQuantity: document.getElementById("itemQuantity"),
      itemMinimum: document.getElementById("itemMinimum"),
      itemBuyPrice: document.getElementById("itemBuyPrice"),
      movementType: document.getElementById("movementType"),
      movementQuantity: document.getElementById("movementQuantity"),
      movementDate: document.getElementById("movementDate"),
      movementReason: document.getElementById("movementReason"),
      movementNote: document.getElementById("movementNote"),
      historyList: document.getElementById("historyList")
    };

    const menuToggle = document.getElementById("menuToggle");
    const sidebar = document.getElementById("sidebar");
    const sidebarOverlay = document.getElementById("sidebarOverlay");
    const addItemBtn = document.getElementById("addItemBtn");
    const resetBtn = document.getElementById("resetBtn");
    const saveItemBtn = document.getElementById("saveItemBtn");
    const deleteItemBtn = document.getElementById("deleteItemBtn");
    const addMovementBtn = document.getElementById("addMovementBtn");
    const clearMovementBtn = document.getElementById("clearMovementBtn");

    function cloneDefaults() {
      return DEFAULT_ITEMS.map(item => ({ ...item }));
    }

    function getItems() {
      try {
        const parsed = JSON.parse(localStorage.getItem(INVENTORY_KEY) || "[]");
        if (Array.isArray(parsed) && parsed.length) return parsed;
        return cloneDefaults();
      } catch (error) {
        return cloneDefaults();
      }
    }

    function getLog() {
      try {
        const parsed = JSON.parse(localStorage.getItem(INVENTORY_LOG_KEY) || "[]");
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        return [];
      }
    }

    let items = getItems();
    let movementLog = getLog();
    let selectedId = items[0]?.id || null;

    if (!localStorage.getItem(INVENTORY_KEY)) {
      localStorage.setItem(INVENTORY_KEY, JSON.stringify(items));
    }

    if (!elements.movementDate.value) {
      elements.movementDate.value = new Date().toISOString().slice(0, 10);
    }

    function saveItems() {
      localStorage.setItem(INVENTORY_KEY, JSON.stringify(items));
    }

    function saveLog() {
      localStorage.setItem(INVENTORY_LOG_KEY, JSON.stringify(movementLog));
    }

    function formatMoney(value) {
      return Number(value || 0).toLocaleString("en-US");
    }

    function currentLanguage() {
      return window.RomeoLanguage?.getCurrentLanguage?.()
        || localStorage.getItem("romeo-pos-language")
        || document.body?.dataset.language
        || "ar";
    }

    function localizeText(arText, enText) {
      return currentLanguage() === "en" ? enText : arText;
    }

    function getDefaultItemMeta(item) {
      return DEFAULT_ITEMS.find(defaultItem =>
        defaultItem.code === item.code ||
        defaultItem.name === item.name ||
        defaultItem.arName === item.name
      ) || null;
    }

    function getItemName(item) {
      const meta = getDefaultItemMeta(item);
      return localizeText(meta?.arName || item.name, meta?.name || item.name);
    }

    function getItemCategory(item) {
      const meta = getDefaultItemMeta(item);
      return localizeText(meta?.arCategory || item.category || "عام", meta?.category || item.category || "General");
    }

    function applyInlineTranslations() {
      document.querySelectorAll("[data-i18n-ar][data-i18n-en]").forEach(element => {
        element.textContent = localizeText(element.dataset.i18nAr, element.dataset.i18nEn);
      });
      document.querySelectorAll("[data-i18n-placeholder-ar][data-i18n-placeholder-en]").forEach(element => {
        element.placeholder = localizeText(element.dataset.i18nPlaceholderAr, element.dataset.i18nPlaceholderEn);
      });
    }

    function applyInventoryLanguage() {
      applyInlineTranslations();
      elements.movementNote.placeholder = localizeText("اكتب ملاحظات عن الحركة", "Write notes about the movement");
    }

    function numberValue(value) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function getSelectedItem() {
      return items.find(item => item.id === selectedId) || null;
    }

    function getItemLog(itemId) {
      return movementLog.filter(entry => entry.itemId === itemId);
    }

    function isLowStock(item) {
      return numberValue(item.quantity) <= numberValue(item.minimum);
    }

    function renderItemList() {
      const query = elements.searchInput.value.trim().toLowerCase();
      const filtered = items.filter(item =>
        !query ||
        getItemName(item).toLowerCase().includes(query) ||
        String(item.name || "").toLowerCase().includes(query) ||
        String(item.code || "").toLowerCase().includes(query) ||
        getItemCategory(item).toLowerCase().includes(query) ||
        String(item.category || "").toLowerCase().includes(query)
      );

      elements.itemList.innerHTML = "";

      filtered.forEach(item => {
        const card = document.createElement("button");
        card.type = "button";
        card.className = `item-card${item.id === selectedId ? " active" : ""}${isLowStock(item) ? " low" : ""}`;
        card.innerHTML = `
          <strong>${getItemName(item)}</strong>
          <div class="item-meta">
            <span>${item.code}</span>
            <span>${localizeText("الكمية", "Qty")} ${numberValue(item.quantity)}</span>
          </div>
        `;
        card.addEventListener("click", () => {
          selectedId = item.id;
          renderAll();
        });
        elements.itemList.appendChild(card);
      });

      if (!filtered.length) {
        elements.itemList.innerHTML = `<div class="history-empty">${localizeText("لا يوجد صنف مطابق.", "No item found.")}</div>`;
      }
    }

    function renderHero() {
      const item = getSelectedItem();
      if (!item) {
        elements.itemTitle.textContent = localizeText("لم يتم اختيار صنف", "No Item Selected");
        elements.itemSubtitle.textContent = localizeText(
          "أضف صنف جديد أو اختر صنف من القائمة.",
          "Add a new item or choose an item from the list."
        );
        elements.itemCode.textContent = "--";
        return;
      }

      elements.itemTitle.textContent = getItemName(item);
      elements.itemSubtitle.textContent = localizeText(
        `الصنف الحالي في قسم ${getItemCategory(item)}، ويمكنك تعديل بياناته أو تسجيل حركة دخول وخروج للمخزون.`,
        `The current item is in the ${getItemCategory(item)} category. You can edit its details or record stock in and out movements.`
      );
      elements.itemCode.textContent = item.code;
    }

    function fillItemForm() {
      const item = getSelectedItem();
      if (!item) {
        elements.itemName.value = "";
        elements.itemCodeInput.value = "";
        elements.itemCategory.value = "";
        elements.itemQuantity.value = "";
        elements.itemMinimum.value = "";
        elements.itemBuyPrice.value = "";
        elements.currentStock.textContent = "0";
        elements.minimumStock.textContent = "0";
        elements.buyPrice.textContent = "0";
        return;
      }

      elements.itemName.value = item.name;
      elements.itemCodeInput.value = item.code;
      elements.itemCategory.value = item.category;
      elements.itemQuantity.value = item.quantity;
      elements.itemMinimum.value = item.minimum;
      elements.itemBuyPrice.value = item.buyPrice;
      elements.currentStock.textContent = numberValue(item.quantity);
      elements.minimumStock.textContent = numberValue(item.minimum);
      elements.buyPrice.textContent = formatMoney(item.buyPrice);
    }

    function renderSummary() {
      elements.lowStockCount.textContent = items.filter(isLowStock).length;
    }

    function renderHistory() {
      const item = getSelectedItem();
      const logs = item ? getItemLog(item.id) : [];
      const sorted = [...logs].sort((a, b) => new Date(b.date) - new Date(a.date));
      elements.historyList.innerHTML = "";

      if (!item) {
        elements.historyList.innerHTML = `<div class="history-empty">${localizeText("لا يوجد صنف مختار الآن.", "No item is selected right now.")}</div>`;
        return;
      }

      if (!sorted.length) {
        elements.historyList.innerHTML = `<div class="history-empty">${localizeText("لا توجد حركات مخزون لهذا الصنف حتى الآن.", "No stock movements have been recorded for this item yet.")}</div>`;
        return;
      }

      sorted.forEach(entry => {
        const row = document.createElement("article");
        row.className = "history-item";
        row.innerHTML = `
          <div class="history-top">
            <div class="history-amount ${entry.type}">${entry.type === "in" ? "+" : "-"}${numberValue(entry.quantity)}</div>
            <button type="button" class="action-btn soft" data-delete-log-id="${entry.id}">${localizeText("حذف", "Delete")}</button>
          </div>
          <div class="history-meta">
            <span>${entry.reason || (entry.type === "in" ? localizeText("دخول مخزون", "Stock In") : localizeText("خروج مخزون", "Stock Out"))}</span>
            <span>${entry.date}</span>
          </div>
          <div class="history-note">${entry.note || localizeText("لا توجد ملاحظة", "No note")}</div>
        `;
        elements.historyList.appendChild(row);
      });
    }

    function renderAll() {
      if (!items.find(item => item.id === selectedId)) {
        selectedId = items[0]?.id || null;
      }
      renderItemList();
      applyInventoryLanguage();
      renderHero();
      fillItemForm();
      renderSummary();
      renderHistory();
    }

    function addItem() {
      const name = prompt(localizeText("اكتب اسم الصنف", "Enter item name"));
      if (!name) return;

      const code = prompt(localizeText("اكتب كود الصنف", "Enter item code"), `INV${String(items.length + 1).padStart(2, "0")}`);
      if (!code) return;

      const item = {
        id: Date.now(),
        name: name.trim(),
        code: code.trim().toUpperCase(),
        category: currentLanguage() === "en" ? "General" : "عام",
        quantity: 0,
        minimum: 0,
        buyPrice: 0
      };

      items.unshift(item);
      selectedId = item.id;
      saveItems();
      renderAll();
    }

    function saveItem() {
      const item = getSelectedItem();
      if (!item) return;

      item.name = elements.itemName.value.trim() || item.name;
      item.code = elements.itemCodeInput.value.trim().toUpperCase() || item.code;
      item.category = elements.itemCategory.value.trim() || item.category;
      item.quantity = numberValue(elements.itemQuantity.value);
      item.minimum = numberValue(elements.itemMinimum.value);
      item.buyPrice = numberValue(elements.itemBuyPrice.value);

      saveItems();
      renderAll();
    }

    function deleteItem() {
      const item = getSelectedItem();
      if (!item) return;
      if (!confirm(localizeText(`تحذف الصنف ${getItemName(item)}؟`, `Delete item ${getItemName(item)}?`))) return;

      items = items.filter(entry => entry.id !== item.id);
      movementLog = movementLog.filter(entry => entry.itemId !== item.id);
      saveItems();
      saveLog();
      selectedId = items[0]?.id || null;
      renderAll();
    }

    function addMovement() {
      const item = getSelectedItem();
      const quantity = numberValue(elements.movementQuantity.value);
      if (!item) {
        alert(localizeText("اختار صنف الأول.", "Choose an item first."));
        return;
      }

      if (!Number.isFinite(quantity) || quantity <= 0) {
        alert(localizeText("اكتب كمية صحيحة.", "Enter a valid quantity."));
        return;
      }

      const type = elements.movementType.value;
      if (type === "out" && quantity > numberValue(item.quantity)) {
        alert(localizeText("الكمية المسحوبة أكبر من الموجود في المخزون.", "The stock out quantity is greater than the current stock."));
        return;
      }

      item.quantity = type === "in"
        ? numberValue(item.quantity) + quantity
        : numberValue(item.quantity) - quantity;

      movementLog.unshift({
        id: Date.now(),
        itemId: item.id,
        type,
        quantity,
        date: elements.movementDate.value || new Date().toISOString().slice(0, 10),
        reason: elements.movementReason.value.trim(),
        note: elements.movementNote.value.trim()
      });

      saveItems();
      saveLog();
      clearMovement();
      renderAll();
    }

    function clearMovement() {
      elements.movementType.value = "in";
      elements.movementQuantity.value = "";
      elements.movementDate.value = new Date().toISOString().slice(0, 10);
      elements.movementReason.value = "";
      elements.movementNote.value = "";
    }

    function deleteLog(id) {
      const entry = movementLog.find(item => item.id === id);
      const item = entry ? items.find(product => product.id === entry.itemId) : null;
      if (!entry || !item) return;

      item.quantity = entry.type === "in"
        ? numberValue(item.quantity) - numberValue(entry.quantity)
        : numberValue(item.quantity) + numberValue(entry.quantity);

      movementLog = movementLog.filter(log => log.id !== id);
      saveItems();
      saveLog();
      renderAll();
    }

    function resetItems() {
      if (!confirm(localizeText("ترجع المخزون للبيانات التجريبية؟", "Reset inventory to demo data?"))) return;
      items = cloneDefaults();
      movementLog = [];
      saveItems();
      saveLog();
      selectedId = items[0]?.id || null;
      renderAll();
    }

    function openSidebar() {
      sidebar.classList.add("active");
      sidebarOverlay.classList.add("active");
    }

    function closeSidebar() {
      sidebar.classList.remove("active");
      sidebarOverlay.classList.remove("active");
    }

    document.querySelectorAll(".sidebar-link[data-permission]").forEach(link => {
      if (!RomeoAuth.hasPermission(link.dataset.permission)) {
        link.style.display = "none";
      }
    });

    document.querySelectorAll(".sidebar-link[data-href]").forEach(link => {
      link.addEventListener("click", () => {
        window.location.href = link.dataset.href;
      });
    });

    elements.searchInput.addEventListener("input", renderItemList);
    addItemBtn.addEventListener("click", addItem);
    resetBtn.addEventListener("click", resetItems);
    saveItemBtn.addEventListener("click", saveItem);
    deleteItemBtn.addEventListener("click", deleteItem);
    addMovementBtn.addEventListener("click", addMovement);
    clearMovementBtn.addEventListener("click", clearMovement);
    elements.historyList.addEventListener("click", event => {
      const btn = event.target.closest("[data-delete-log-id]");
      if (!btn) return;
      if (!confirm(localizeText("تحذف حركة المخزون دي؟", "Delete this stock movement?"))) return;
      deleteLog(Number(btn.dataset.deleteLogId));
    });
    menuToggle.addEventListener("click", openSidebar);
    sidebarOverlay.addEventListener("click", closeSidebar);
    document.getElementById("logoutBtn").addEventListener("click", () => RomeoAuth.logout());
    window.addEventListener("romeo-language-change", renderAll);

    clearMovement();
    renderAll();
  </script>
  <script src="../assets/js/utils/keyboard-navigation.js"></script>
  <script src="../assets/js/utils/language.js"></script>
</body>
</html>
