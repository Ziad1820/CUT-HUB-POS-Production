<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/shared.css">
<title>Login - SALONIX</title>
  <style>
    :root {
      --ink: #2a2118;
      --muted: #77695c;
      --accent-dark: #8c642e;
      --success: #18794e;
      --danger: #ba3a2c;
      --border: #e5d5be;
      --shadow: 0 18px 40px rgba(76,54,28,.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(183,134,63,0.18), transparent 28%),
        linear-gradient(135deg, #f8f2e8 0%, #f0e4d0 100%);
      color: var(--ink);
    }

    .login-card {
      width: min(460px, 100%);
      background: rgba(255,250,242,0.95);
      border: 1px solid rgba(229,213,190,.8);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 28px;
    }

    .login-card .brand-lockup {
      display: grid;
      justify-items: center;
      gap: 8px;
      margin-bottom: 18px;
      text-align: center;
    }

    .login-card .brand-logo {
      width: 76px;
      height: 76px;
      object-fit: contain;
    }

    .login-card .brand-name {
      margin: 0;
      color: var(--ink);
      font-size: 40px;
      line-height: 1;
      letter-spacing: 1px;
      text-align: center;
    }

    .login-card .brand-slogan {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1.2px;
      line-height: 1.3;
      text-align: center;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 8px;
      text-align: center;
      color: #2a2118;
      font-size: 34px;
    }

    p {
      margin: 0 0 22px;
      text-align: center;
      color: var(--muted);
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .field label {
      font-weight: 700;
    }

    .field input {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      font-size: 16px;
      background: #fffaf2;
      outline: none;
    }

    .primary-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px;
      font-size: 17px;
      font-weight: 800;
      color: white;
      cursor: pointer;
      background: linear-gradient(135deg, var(--success), #0f5a39);
    }

    .status {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      display: none;
    }

    .status.error {
      display: block;
      background: rgba(186,58,44,0.12);
      color: var(--danger);
      border: 1px solid rgba(186,58,44,0.18);
    }

    .hint {
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    /* Splash animation on successful login */
    .splash {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(255,250,242,0.9);
      z-index: 2000;
      animation: fadeOut 1.2s ease forwards;
    }
    .splash.active { display: grid; }
    .splash .scissor {
      position: relative;
      width: 118px;
      height: 92px;
      animation: cut 1s ease forwards;
    }

    .splash .scissor::before,
    .splash .scissor::after {
      content: "";
      position: absolute;
      left: 42px;
      top: 42px;
      width: 72px;
      height: 8px;
      border-radius: 999px;
      background: #2a2118;
      transform-origin: 0 50%;
      box-shadow: 0 0 0 1px rgba(42,33,24,0.08);
    }

    .splash .scissor::before {
      transform: rotate(25deg);
    }

    .splash .scissor::after {
      transform: rotate(-25deg);
    }

    .splash .scissor .handle {
      position: absolute;
      width: 34px;
      height: 34px;
      border: 8px solid #2a2118;
      border-radius: 50%;
      background: transparent;
    }

    .splash .scissor .handle.first {
      left: 4px;
      top: 16px;
    }

    .splash .scissor .handle.second {
      left: 4px;
      bottom: 8px;
    }

    .splash .scissor .joint {
      position: absolute;
      left: 35px;
      top: 35px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #b7863f;
      border: 5px solid #2a2118;
      z-index: 2;
    }
    @keyframes cut {
      0%   { transform: scale(0.1) rotate(-20deg); opacity: 0; }
      50%  { transform: scale(1.05) rotate(6deg); opacity: 1; }
      80%  { transform: scale(1) rotate(0deg); }
      100% { transform: scale(0.95) rotate(-4deg); }
    }
    @keyframes fadeOut {
      0%   { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; }
    }

    @media (max-width: 640px) {
      body {
        min-height: 100svh;
        align-items: center;
        padding: 18px;
      }

      .login-card {
        width: min(100%, 420px);
        border-radius: 24px;
        padding: 26px 22px;
      }

      .login-card .brand-logo {
        width: 72px;
        height: 72px;
      }

      .login-card .brand-name {
        font-size: 38px;
      }

      .login-card .brand-slogan {
        max-width: 260px;
        font-size: 10px;
        letter-spacing: 1px;
      }
    }
  </style>
</head>
<body>
  <div class="splash" id="loginSplash">
    <div class="scissor" aria-hidden="true">
      <span class="handle first"></span>
      <span class="handle second"></span>
      <span class="joint"></span>
    </div>
  </div>
  <div class="login-card">
    <div class="brand-lockup">
        <img class="brand-logo" src="../assets/images/salonix-logo.svg" alt="SALONIX logo">
        <h1 class="brand-name">SALONIX</h1>
        <p class="brand-slogan">THE SMART WAY TO RUN YOUR SALON</p>
      </div>
    <p>ادخل بياناتك لتسجيل الدخول، ثم سيتم توجيهك للصفحة المطلوبة تلقائيًا.</p>

    <form id="loginForm">
      <div class="field">
        <label for="username">اسم المستخدم</label>
        <input id="username" type="text" autocomplete="username" required>
      </div>

      <div class="field">
        <label for="password">كلمة المرور</label>
        <input id="password" type="password" autocomplete="current-password" required>
      </div>

      <button class="primary-btn" type="submit">تسجيل الدخول</button>
      <div class="status" id="statusBox"></div>
    </form>

  </div>

  <script src="../assets/js/utils/text-fix.js"></script>
  <script src="../assets/js/core/api.js"></script>
  <script src="../assets/js/core/auth.js"></script>
  <script src="../assets/js/utils/layout.js"></script>
  <script>
    if (RomeoAuth.getCurrentUser()) {
      window.location.href = RomeoAuth.getReturnTo();
    }

    const loginForm = document.getElementById("loginForm");
    const statusBox = document.getElementById("statusBox");
    const splash = document.getElementById("loginSplash");
    const loginReason = new URLSearchParams(window.location.search).get("reason");

    if (loginReason === "session-expired") {
      const isEnglish = localStorage.getItem("romeo-pos-language") === "en";
      statusBox.textContent = isEnglish
        ? "Your 12-hour session has expired. Please sign in again."
        : "انتهت صلاحية جلسة الدخول بعد 12 ساعة. سجل دخولك مرة أخرى.";
      statusBox.className = "status error";
    }

    loginForm.addEventListener("submit", async event => {
      event.preventDefault();
      statusBox.textContent = "جاري تسجيل الدخول...";
      statusBox.className = "status";

      const result = await RomeoAuth.login(
        document.getElementById("username").value.trim(),
        document.getElementById("password").value
      );

      if (!result.success) {
        statusBox.textContent = result.message;
        statusBox.className = "status error";
        return;
      }

      splash.classList.add("active");
      setTimeout(() => {
        window.location.href = RomeoAuth.getReturnTo();
      }, 1000);
    });
  </script>
  <script src="../assets/js/utils/keyboard-navigation.js"></script>
</body>
</html>
