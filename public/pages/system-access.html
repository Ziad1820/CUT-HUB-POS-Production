<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/css/shared.css">
<title>System Access - SALONIX</title>
  <style>
    :root {
      --ink: #2a2118;
      --muted: #77695c;
      --success: #18794e;
      --danger: #ba3a2c;
      --border: #e5d5be;
      --shadow: 0 18px 40px rgba(76,54,28,.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(183,134,63,0.18), transparent 28%),
        linear-gradient(135deg, #f8f2e8 0%, #f0e4d0 100%);
      color: var(--ink);
    }

    .app {
      min-height: 100vh;
      padding: 24px;
    }

    .header {
      position: relative;
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: #ffffff;
      border-radius: 24px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      text-align: center;
    }

    .header-menu {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 20;
    }

    .menu-toggle {
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: #fff;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 28px;
      line-height: 1;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(34,23,12,0.34);
      display: none;
      z-index: 999;
    }

    .sidebar-overlay.active {
      display: block;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -320px;
      width: min(320px, 85vw);
      height: 100vh;
      background: #fffaf2;
      border-right: 1px solid rgba(229,213,190,.8);
      box-shadow: var(--shadow);
      padding: 24px 18px;
      z-index: 1000;
      transition: left 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .sidebar.active {
      left: 0;
    }

    .sidebar h3 {
      margin: 0 0 8px;
      color: #2a2118;
      font-size: 22px;
      text-align: left;
      direction: ltr;
    }

    .sidebar-link,
    .sidebar button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      background: #ead9bd;
      color: var(--ink);
      text-align: left;
      direction: ltr;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .sidebar-link.active {
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: white;
    }

    .layout {
      display: grid;
      grid-template-columns: 0.95fr 1.05fr;
      gap: 24px;
    }

    .panel {
      background: rgba(255,250,242,0.95);
      border: 1px solid rgba(229,213,190,.8);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .panel h2 {
      margin: 0 0 8px;
    }

    .panel p {
      margin: 0 0 18px;
      color: var(--muted);
    }

    .field {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .field input {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 16px;
      background: #fffaf2;
      outline: none;
    }

    .permissions {
      display: grid;
      gap: 10px;
      margin-bottom: 20px;
    }

    .permission-item {
      display: flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fffaf2;
      padding: 12px 14px;
    }

    .actions,
    .user-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .primary-btn,
    .secondary-btn,
    .danger-btn {
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
    }

    .primary-btn {
      background: linear-gradient(135deg, var(--success), #0f5a39);
      color: white;
    }

    .secondary-btn {
      background: #ead9bd;
      color: var(--ink);
    }

    .danger-btn {
      background: linear-gradient(135deg, var(--danger), #8f281f);
      color: white;
    }

    .users-list {
      display: grid;
      gap: 12px;
    }

    .user-card {
      background: #fffaf2;
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
    }

    .user-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 18px;
    }

    .user-card small,
    .user-card p {
      color: var(--muted);
      margin: 0 0 12px;
    }

    .status {
      margin-top: 16px;
      padding: 14px;
      border-radius: 14px;
      display: none;
    }

    .status.success {
      display: block;
      background: rgba(23,121,78,0.12);
      color: var(--success);
      border: 1px solid rgba(23,121,78,0.18);
    }

    .status.error {
      display: block;
      background: rgba(186,58,44,0.12);
      color: var(--danger);
      border: 1px solid rgba(186,58,44,0.18);
    }

    @media (max-width: 960px) {
      .header-menu {
        position: absolute;
        top: 16px;
        left: 16px;
        width: auto;
        margin: 0;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .app {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-menu">
        <button type="button" class="menu-toggle" id="menuToggle">...</button>
      </div>

      <div class="brand-lockup">
        <img class="brand-logo" src="../assets/images/salonix-logo.svg" alt="SALONIX logo">
        <h1 class="brand-name">SALONIX</h1>
        <p class="brand-slogan">THE SMART WAY TO RUN YOUR SALON</p>
      </div>
    </div>

    <div class="layout">
      <section class="panel">
        <h2>إضافة أو تعديل مستخدم</h2>
        <p>أضف اسم المستخدم وكلمة المرور واسم صاحب الحساب، ثم اختر الصلاحيات المناسبة له.</p>

        <div class="field">
          <label for="displayName">اسم صاحب الحساب</label>
          <input id="displayName" type="text" placeholder="مثال: أحمد">
        </div>

        <div class="field">
          <label for="username">اسم المستخدم</label>
          <input id="username" type="text" placeholder="مثال: ahmed">
        </div>

        <div class="field">
          <label for="password">كلمة المرور</label>
          <input id="password" type="text" placeholder="اكتب كلمة المرور">
        </div>

        <div class="permissions"></div>

        <div class="actions">
          <button class="primary-btn" type="button" id="saveUserBtn">حفظ المستخدم</button>
          <button class="secondary-btn" type="button" id="resetFormBtn">تفريغ الحقول</button>
        </div>

        <div class="status" id="statusBox"></div>
      </section>

      <section class="panel">
        <h2>المستخدمون الحاليون</h2>
        <p>يمكنك تعديل أو حذف أي مستخدم غير مالك النظام.</p>
        <div class="users-list" id="usersList"></div>
      </section>
    </div>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <aside class="sidebar" id="sidebar">
    <h3>Menu</h3>
    <button class="sidebar-link" type="button" data-href="cashier.html" data-permission="access_cashier">الكاشير</button>
    <button class="sidebar-link" type="button" data-href="invoices.html">الفواتير</button>
    <button class="sidebar-link" type="button" data-href="income-statement.html" data-permission="view_income_statement">قائمة الدخل</button>
    <button class="sidebar-link" type="button" data-href="daily-closing.html" data-permission="view_income_statement">تقفيلة اليوم</button>
    <button class="sidebar-link" type="button" data-href="data-analysis.html" data-permission="view_income_statement">تحليل البيانات</button>
      <button class="sidebar-link" type="button" data-href="activity-log.html" data-permission="manage_users">سجل العمليات</button>
    <button class="sidebar-link" type="button" data-href="staff-accounting.html" data-permission="view_staff_accounting">حسابات الموظفين</button>
    <button class="sidebar-link active" type="button">صلاحيات النظام</button>
    <button class="sidebar-link" type="button" data-href="withdrawals.html">Withdrawals</button>
    <button class="sidebar-link" type="button" data-href="expenses.html">Expenses</button>
    <button class="sidebar-link" type="button" data-href="enventory.html">Enventory</button>
    <button class="sidebar-link" type="button" data-href="attendance.html">Attendance</button>
    <button class="sidebar-link" type="button" data-href="bookings.html">Bookings</button>
    <button type="button" id="logoutBtn">تسجيل الخروج</button>
  </aside>

  <script src="../assets/js/utils/text-fix.js"></script>
  <script src="../assets/js/core/api.js"></script>
  <script src="../assets/js/core/auth.js"></script>
  <script src="../assets/js/utils/layout.js"></script>
  <script>
    const currentUser = RomeoAuth.requireOwner();
    if (!currentUser) {
      throw new Error("System owner access is required.");
    }

    const permissionLabels = {
      access_dashboard: { ar: "لوحة التحكم", en: "Dashboard" },
      access_cashier: { ar: "الكاشير", en: "Cashier" },
      edit_prices: { ar: "تعديل الأسعار", en: "Edit Prices" },
      view_invoices: { ar: "الفواتير", en: "Invoices" },
      view_income_statement: { ar: "قائمة الدخل", en: "Income Statement" },
      view_daily_closing: { ar: "تقفيلة اليوم", en: "Daily Closing" },
      view_data_analysis: { ar: "تحليل البيانات", en: "Data Analysis" },
      view_activity_log: { ar: "سجل العمليات", en: "Activity Log" },
      view_staff_accounting: { ar: "حسابات الموظفين", en: "Staff Accounting" },
      view_withdrawals: { ar: "السحوبات", en: "Withdrawals" },
      view_expenses: { ar: "المصروفات", en: "Expenses" },
      view_inventory: { ar: "المخزون", en: "Inventory" },
      view_staff_discount: { ar: "خصومات الموظفين", en: "Staff Discount" },
      view_attendance: { ar: "الحضور", en: "Attendance" },
      view_bookings: { ar: "الحجوزات", en: "Bookings" },
      manage_users: { ar: "إدارة المستخدمين", en: "Manage Users" }
    };

    const usersList = document.getElementById("usersList");
    const statusBox = document.getElementById("statusBox");
    let usersCache = [];
    let editingUsername = "";

    const systemPermissions = [
      "access_dashboard",
      "access_cashier",
      "edit_prices",
      "view_invoices",
      "view_income_statement",
      "view_daily_closing",
      "view_data_analysis",
      "view_activity_log",
      "view_staff_accounting",
      "view_withdrawals",
      "view_expenses",
      "view_inventory",
      "view_staff_discount",
      "view_attendance",
      "view_bookings"
    ];

    const staticTexts = [
      [".layout .panel:first-child h2", "إضافة أو تعديل مستخدم", "Add or Edit User"],
      [".layout .panel:first-child > p", "أضف اسم المستخدم وكلمة المرور واسم صاحب الحساب، ثم اختر الصلاحيات المناسبة له.", "Add the username, password, and account owner name, then choose the right permissions."],
      ["label[for='displayName']", "اسم صاحب الحساب", "Display Name"],
      ["label[for='username']", "اسم المستخدم", "Username"],
      ["label[for='password']", "كلمة المرور", "Password"],
      ["#saveUserBtn", "حفظ المستخدم", "Save User"],
      ["#resetFormBtn", "تفريغ الحقول", "Clear Fields"],
      [".layout .panel:nth-child(2) h2", "المستخدمون الحاليون", "Current Users"],
      [".layout .panel:nth-child(2) > p", "يمكنك تعديل أو حذف أي مستخدم غير مالك النظام.", "You can edit or delete any user except the system owner."],
      [".sidebar h3", "القائمة", "Menu"],
      [".sidebar-link[data-href='cashier.html']", "الكاشير", "Cashier"],
      [".sidebar-link[data-href='invoices.html']", "الفواتير", "Invoices"],
      [".sidebar-link[data-href='income-statement.html']", "قائمة الدخل", "Income Statement"],
      [".sidebar-link[data-href='daily-closing.html']", "تقفيلة اليوم", "Daily Closing"],
      [".sidebar-link[data-href='data-analysis.html']", "تحليل البيانات", "Data Analysis"],
      [".sidebar-link[data-href='activity-log.html']", "سجل العمليات", "Activity Log"],
      [".sidebar-link[data-href='staff-accounting.html']", "حسابات الموظفين", "Staff Accounting"],
      [".sidebar-link.active", "صلاحيات النظام", "System Access"],
      [".sidebar-link[data-href='withdrawals.html']", "السحوبات", "Withdrawals"],
      [".sidebar-link[data-href='expenses.html']", "المصروفات", "Expenses"],
      [".sidebar-link[data-href='enventory.html']", "المخزون", "Inventory"],
      [".sidebar-link[data-href='staff-discount.html']", "خصومات الموظفين", "Staff Discount"],
      [".sidebar-link[data-href='attendance.html']", "الحضور", "Attendance"],
      [".sidebar-link[data-href='bookings.html']", "الحجوزات", "Bookings"],
      ["#logoutBtn", "تسجيل الخروج", "Logout"]
    ];

    function currentLanguage() {
      return window.RomeoLanguage?.getCurrentLanguage?.()
        || localStorage.getItem("romeo-pos-language")
        || document.body?.dataset.language
        || "ar";
    }

    function localizeText(arText, enText) {
      return currentLanguage() === "en" ? enText : arText;
    }

    function permissionLabel(permission, withOpen = false) {
      const label = permissionLabels[permission];
      if (!label) return permission;
      const text = label[currentLanguage()] || label.ar;
      if (!withOpen || permission === "edit_prices" || permission === "manage_users") {
        return text;
      }
      return localizeText(`فتح ${label.ar}`, `Open ${label.en}`);
    }

    function localizeDisplayName(user) {
      const name = String(user?.displayName || "").trim();
      if (currentLanguage() === "en" && (isOwner(user) || name === "مالك النظام")) {
        return "System Owner";
      }
      return name || "-";
    }

    function applySystemAccessLanguage() {
      staticTexts.forEach(([selector, arText, enText]) => {
        const element = document.querySelector(selector);
        if (element) element.textContent = localizeText(arText, enText);
      });

      document.getElementById("displayName").placeholder = localizeText("مثال: أحمد", "Example: Ahmed");
      document.getElementById("username").placeholder = localizeText("مثال: ahmed", "Example: ahmed");
      document.getElementById("password").placeholder = localizeText("اكتب كلمة المرور", "Enter password");
    }

    function renderPermissionOptions() {
      const permissionsBox = document.querySelector(".permissions");
      if (!permissionsBox) return;

      permissionsBox.innerHTML = systemPermissions.map((value, index) => `
        <label class="permission-item">
          <input type="checkbox" value="${value}" ${index === 0 ? "checked" : ""}> ${permissionLabel(value, true)}
        </label>
      `).join("");
    }

    function showStatus(message, type) {
      statusBox.textContent = message;
      statusBox.className = `status ${type}`;
    }

    function resetForm() {
      editingUsername = "";
      document.getElementById("displayName").value = "";
      const usernameInput = document.getElementById("username");
      usernameInput.value = "";
      usernameInput.disabled = false;
      document.getElementById("password").value = "";
      document.querySelectorAll('.permissions input[type="checkbox"]').forEach((input, index) => {
        input.disabled = false;
        input.checked = index === 0;
      });
    }

    function selectedPermissions() {
      return Array.from(document.querySelectorAll('.permissions input[type="checkbox"]:checked')).map(input => input.value);
    }

    function isOwner(user) {
      return window.RomeoAuth && typeof RomeoAuth.isOwnerUser === "function"
        ? RomeoAuth.isOwnerUser(user)
        : String(user && user.username || "").trim().toLowerCase() === "owner";
    }

    function renderUsers() {
      usersList.innerHTML = usersCache.map(user => {
        const owner = isOwner(user);
        const permissionsText = owner
          ? localizeText("مالك النظام الأساسي - كل الصلاحيات", "Main system owner - all permissions")
          : user.permissions.map(permission => permissionLabel(permission, true)).join(" - ");

        return `
        <div class="user-card">
          <strong>${localizeDisplayName(user)}</strong>
          <small>@${user.username}</small>
          <p>${permissionsText}</p>
          <div class="user-actions">
            <button class="secondary-btn" type="button" onclick="editUser('${user.username}')">${localizeText("تعديل", "Edit")}</button>
            ${owner ? "" : `<button class="danger-btn" type="button" onclick="removeUser('${user.username}')">${localizeText("حذف", "Delete")}</button>`}
          </div>
        </div>
      `;
      }).join("");
    }

    async function loadUsers() {
      try {
        usersList.innerHTML = `<p>${localizeText("جاري تحميل المستخدمين...", "Loading users...")}</p>`;
        usersCache = await RomeoAuth.getUsers({ forceRefresh: true });
        renderUsers();
      } catch (error) {
        usersList.innerHTML = "";
        showStatus(error.message || localizeText("تعذر تحميل المستخدمين.", "Could not load users."), "error");
      }
    }

    async function saveUser() {
      const displayName = document.getElementById("displayName").value.trim();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;
      const permissions = selectedPermissions().filter(permission => permission !== "manage_users");
      const editingUser = editingUsername
        ? usersCache.find(user => user.username === editingUsername)
        : null;
      const existing = editingUser || usersCache.find(user => user.username === username);

      if (username.toLowerCase() === "owner" && !existing) {
        showStatus(localizeText("لا يمكن إنشاء مالك نظام ثاني. استخدم اسم مستخدم مختلف.", "You cannot create a second system owner. Use a different username."), "error");
        return;
      }

      if (editingUsername && !editingUser) {
        showStatus(localizeText("تعذر العثور على المستخدم الجاري تعديله. أعد تحميل المستخدمين وحاول مرة أخرى.", "Could not find the user being edited. Reload users and try again."), "error");
        return;
      }

      showStatus(localizeText("جاري حفظ المستخدم...", "Saving user..."), "success");

      const result = existing
        ? await RomeoAuth.updateUser(existing.username, {
            displayName,
            password,
            permissions
          })
        : await RomeoAuth.createUser({
            displayName,
            username,
            password,
            permissions
          });

      if (!result.success) {
        showStatus(result.message, "error");
        return;
      }

      showStatus(
        existing
          ? localizeText("تم تعديل المستخدم بنجاح.", "User updated successfully.")
          : localizeText("تم إضافة المستخدم بنجاح.", "User added successfully."),
        "success"
      );
      resetForm();
      await loadUsers();
    }

    window.editUser = username => {
      const user = usersCache.find(item => item.username === username);
      if (!user) {
        return;
      }

      editingUsername = user.username;
      document.getElementById("displayName").value = user.displayName;
      const usernameInput = document.getElementById("username");
      usernameInput.value = user.username;
      usernameInput.disabled = true;
      document.getElementById("password").value = "";
      document.querySelectorAll('.permissions input[type="checkbox"]').forEach(input => {
        input.checked = isOwner(user) || user.permissions.includes(input.value);
        input.disabled = isOwner(user);
      });
      showStatus(
        localizeText(
          `أنت الآن تعدل المستخدم ${user.username}. اترك كلمة المرور فارغة إذا لا تريد تغييرها.`,
          `You are now editing ${user.username}. Leave the password empty if you do not want to change it.`
        ),
        "success"
      );
    };

    window.removeUser = async username => {
      if (!window.confirm(localizeText(`هل تريد حذف المستخدم ${username}؟`, `Delete user ${username}?`))) {
        return;
      }

      showStatus(localizeText("جاري حذف المستخدم...", "Deleting user..."), "success");
      const result = await RomeoAuth.deleteUser(username);
      if (!result.success) {
        showStatus(result.message, "error");
        return;
      }

      showStatus(localizeText("تم حذف المستخدم بنجاح.", "User deleted successfully."), "success");
      await loadUsers();
    };

    const menuToggle = document.getElementById("menuToggle");
    const sidebar = document.getElementById("sidebar");
    const sidebarOverlay = document.getElementById("sidebarOverlay");

    function openSidebar() {
      sidebar.classList.add("active");
      sidebarOverlay.classList.add("active");
    }

    function closeSidebar() {
      sidebar.classList.remove("active");
      sidebarOverlay.classList.remove("active");
    }

    document.querySelectorAll(".sidebar-link[data-permission]").forEach(link => {
      if (!RomeoAuth.hasPermission(link.dataset.permission)) {
        link.style.display = "none";
      }
    });

    document.querySelectorAll(".sidebar-link[data-href]").forEach(link => {
      link.addEventListener("click", () => {
        window.location.href = link.dataset.href;
      });
    });

    document.getElementById("saveUserBtn").addEventListener("click", saveUser);
    document.getElementById("resetFormBtn").addEventListener("click", resetForm);
    document.getElementById("logoutBtn").addEventListener("click", () => RomeoAuth.logout());
    menuToggle.addEventListener("click", openSidebar);
    sidebarOverlay.addEventListener("click", closeSidebar);
    window.addEventListener("romeo-language-change", () => {
      applySystemAccessLanguage();
      renderPermissionOptions();
      renderUsers();
    });

    applySystemAccessLanguage();
    renderPermissionOptions();
    resetForm();
    loadUsers();
  </script>
  <script src="../assets/js/utils/keyboard-navigation.js"></script>
  <script src="../assets/js/utils/language.js"></script>
</body>
</html>
