<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../assets/css/shared.css">
  <title>Activity Log - SALONIX</title>
  <style>
    :root {
      --bg: #f4efe6;
      --panel: #fffaf2;
      --ink: #2a2118;
      --muted: #77695c;
      --accent: #b7863f;
      --accent-dark: #8c642e;
      --success: #18794e;
      --danger: #ba3a2c;
      --border: #e5d5be;
      --shadow: 0 18px 40px rgba(76,54,28,.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(183,134,63,.18), transparent 28%),
        linear-gradient(135deg, #f8f2e8 0%, #f0e4d0 100%);
      color: var(--ink);
    }

    .app { min-height: 100vh; padding: 24px; }

    .header {
      position: relative;
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: #fff;
      border-radius: 24px;
      padding: 28px 24px;
      box-shadow: var(--shadow);
      margin-bottom: 24px;
      text-align: center;
    }

    .header h1 { margin: 0 0 8px; font-size: 34px; letter-spacing: 1px; }
    .header p { margin: 0; color: rgba(255,255,255,.82); font-weight: 700; }

    .header-menu {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 20;
    }

    .menu-toggle {
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.08);
      color: #fff;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 28px;
      line-height: 1;
    }

    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(34,23,12,.34);
      display: none;
      z-index: 999;
    }

    .sidebar-overlay.active { display: block; }

    .sidebar {
      position: fixed;
      top: 0;
      left: -320px;
      width: min(320px, 85vw);
      height: 100vh;
      background: #fffaf2;
      border-right: 1px solid rgba(229,213,190,.8);
      box-shadow: var(--shadow);
      padding: 24px 18px;
      z-index: 1000;
      transition: left .2s ease;
      display: flex;
      flex-direction: column;
      gap: 12px;
      overflow-y: auto;
    }

    .sidebar.active { left: 0; }

    .sidebar h3 {
      margin: 0 0 8px;
      color: var(--ink);
      font-size: 22px;
      text-align: left;
      direction: ltr;
    }

    .sidebar-link,
    .sidebar button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px 16px;
      background: #ead9bd;
      color: var(--ink);
      text-align: left;
      direction: ltr;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }

    .sidebar-link.active {
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: #fff;
    }

    .panel {
      background: rgba(255,250,242,.96);
      border: 1px solid rgba(229,213,190,.8);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 22px;
      margin-bottom: 22px;
    }

    .filters {
      display: grid;
      grid-template-columns: minmax(220px, 2fr) repeat(4, minmax(150px, 1fr)) auto;
      gap: 14px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 8px;
      color: var(--muted);
      font-weight: 800;
    }

    input,
    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 16px;
      background: #fffaf2;
      color: var(--ink);
      padding: 14px 16px;
      font-size: 16px;
      min-height: 54px;
    }

    .button {
      border: none;
      border-radius: 16px;
      padding: 15px 20px;
      min-height: 54px;
      background: #ead9bd;
      color: var(--ink);
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
      white-space: nowrap;
    }

    .button.primary {
      background: linear-gradient(135deg, #24180d, #5f4524);
      color: #fff;
    }

    .button.danger {
      background: var(--danger);
      color: #fff;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 22px;
    }

    .metric {
      background: rgba(255,250,242,.96);
      border: 1px solid rgba(229,213,190,.9);
      border-radius: 22px;
      box-shadow: var(--shadow);
      padding: 20px;
      min-height: 118px;
      display: grid;
      align-content: center;
      gap: 10px;
    }

    .metric span { color: var(--muted); font-weight: 800; }
    .metric strong { font-size: 34px; line-height: 1; }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: rgba(255,250,242,.72);
    }

    .bulk-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .select-all-logs {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-weight: 900;
      cursor: pointer;
    }

    .log-select,
    .select-all-logs input {
      width: 20px;
      height: 20px;
      accent-color: var(--danger);
      cursor: pointer;
    }

    .selected-count {
      color: var(--muted);
      font-weight: 900;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 920px;
      direction: ltr;
    }

    th,
    td {
      padding: 16px 14px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      vertical-align: top;
    }

    th {
      background: rgba(234,217,189,.45);
      color: var(--muted);
      font-weight: 900;
    }

    tr:last-child td { border-bottom: none; }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 84px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #ead9bd;
      color: var(--ink);
      font-weight: 900;
      white-space: nowrap;
    }

    .badge.delete { background: #f4ded6; color: #a32b22; }
    .badge.update { background: #efe2c9; color: #6c4a1f; }
    .badge.create { background: #dff0e7; color: #18794e; }
    .badge.login { background: #e8e3f3; color: #4e3a7d; }

    .details {
      max-width: 520px;
      line-height: 1.7;
      color: var(--ink);
      white-space: pre-wrap;
    }

    .empty {
      padding: 36px 18px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
      line-height: 1.8;
    }

    .load-more-wrap {
      display: flex;
      justify-content: center;
      padding-top: 18px;
    }

    .load-more-wrap[hidden] {
      display: none;
    }

    .button.load-more {
      min-width: 220px;
    }

    .mini-delete {
      border: none;
      border-radius: 999px;
      padding: 8px 18px;
      background: #f4ded6;
      color: #a32b22;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    body[data-language="ar"] table { direction: rtl; }
    body[data-language="ar"] th,
    body[data-language="ar"] td { text-align: right; }

    @media (max-width: 1100px) {
      .filters { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 680px) {
      .app { padding: 14px; }
      .header { padding: 72px 16px 24px; }
      .header h1 { font-size: 28px; }
      .filters,
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <div class="header-menu"><button type="button" class="menu-toggle" id="menuToggle">...</button></div>
      <div class="brand-lockup">
        <img class="brand-logo" src="../assets/images/salonix-logo.svg" alt="SALONIX logo">
        <h1 class="brand-name">SALONIX</h1>
        <p class="brand-slogan">THE SMART WAY TO RUN YOUR SALON</p>
      </div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <aside class="sidebar" id="sidebar">
      <h3>Menu</h3>
      <button class="sidebar-link" type="button" data-href="cashier.html" data-permission="access_cashier">Cashier</button>
      <button class="sidebar-link" type="button" data-href="invoices.html">Invoices</button>
      <button class="sidebar-link" type="button" data-href="income-statement.html" data-permission="view_income_statement">Income Statement</button>
      <button class="sidebar-link" type="button" data-href="daily-closing.html" data-permission="view_income_statement">daily closing</button>
      <button class="sidebar-link" type="button" data-href="data-analysis.html" data-permission="view_income_statement">Data Analysis</button>
      <button class="sidebar-link active" type="button" data-permission="manage_users">Activity Log</button>
      <button class="sidebar-link" type="button" data-href="staff-accounting.html" data-permission="view_staff_accounting">Staff Accounting</button>
      <button class="sidebar-link" type="button" data-href="system-access.html" data-permission="manage_users">System Access</button>
      <button class="sidebar-link" type="button" data-href="withdrawals.html" data-permission="view_staff_accounting">Withdrawals</button>
      <button class="sidebar-link" type="button" data-href="expenses.html" data-permission="view_income_statement">Expenses</button>
      <button class="sidebar-link" type="button" data-href="enventory.html">Inventory</button>
      <button class="sidebar-link" type="button" data-href="attendance.html">Attendance</button>
      <button class="sidebar-link" type="button" data-href="bookings.html">Bookings</button>
      <button class="sidebar-link" type="button" id="logoutBtn">Logout</button>
    </aside>

    <section class="panel">
      <div class="filters">
        <label>
          <span data-i18n="Search">Search</span>
          <input id="searchInput" type="search" placeholder="Search by user, action, or details" data-i18n-placeholder="Search by user, action, or details">
        </label>
        <label>
          <span data-i18n="Action Type">Action Type</span>
          <select id="actionFilter">
            <option value="" data-i18n="All actions">All actions</option>
            <option value="delete" data-i18n="Delete">Delete</option>
            <option value="update" data-i18n="Update">Update</option>
            <option value="create" data-i18n="Create">Create</option>
            <option value="login" data-i18n="Login">Login</option>
            <option value="logout" data-i18n="Logout">Logout</option>
            <option value="close_day" data-i18n="Day Closing">Day Closing</option>
          </select>
        </label>
        <label>
          <span data-i18n="Entity Type">Entity Type</span>
          <select id="entityFilter">
            <option value="" data-i18n="All types">All types</option>
            <option value="invoice" data-i18n="Invoice">Invoice</option>
            <option value="expense" data-i18n="Expense">Expense</option>
            <option value="withdrawal" data-i18n="Withdrawal">Withdrawal</option>
            <option value="services" data-i18n="Services">Services</option>
            <option value="user" data-i18n="User">User</option>
            <option value="system" data-i18n="System">System</option>
          </select>
        </label>
        <label>
          <span data-i18n="From Date">From Date</span>
          <input id="fromDate" type="date">
        </label>
        <label>
          <span data-i18n="To Date">To Date</span>
          <input id="toDate" type="date">
        </label>
        <button class="button primary" type="button" id="refreshBtn" data-i18n="Refresh">Refresh</button>
      </div>
    </section>

    <section class="cards">
      <div class="metric"><span data-i18n="Total Logs">Total Logs</span><strong id="totalLogs">0</strong></div>
      <div class="metric"><span data-i18n="Deletes">Deletes</span><strong id="deleteLogs">0</strong></div>
      <div class="metric"><span data-i18n="Updates">Updates</span><strong id="updateLogs">0</strong></div>
      <div class="metric"><span data-i18n="Creates">Creates</span><strong id="createLogs">0</strong></div>
    </section>

    <section class="panel">
      <div class="bulk-actions">
        <label class="select-all-logs">
          <input type="checkbox" id="selectAllLogs">
          <span data-i18n="Select All">Select All</span>
        </label>
        <span class="selected-count" id="selectedLogsCount">0 selected</span>
        <button class="button danger" type="button" id="deleteSelectedLogsBtn" disabled data-i18n="Delete Selected">Delete Selected</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th></th>
              <th data-i18n="Action Type">Action Type</th>
              <th data-i18n="User">User</th>
              <th data-i18n="Date & Time">Date & Time</th>
              <th data-i18n="Entity Type">Entity Type</th>
              <th data-i18n="Details">Details</th>
              <th data-i18n="Actions">Actions</th>
            </tr>
          </thead>
          <tbody id="logsBody">
            <tr><td class="empty" colspan="7" data-i18n="Loading...">Loading...</td></tr>
          </tbody>
        </table>
      </div>
      <div class="load-more-wrap" id="loadMoreWrap" hidden>
        <button class="button load-more" type="button" id="loadMoreBtn">عرض المزيد</button>
      </div>
    </section>
  </div>

  <script src="../assets/js/utils/text-fix.js"></script>
  <script src="../assets/js/core/api.js"></script>
  <script src="../assets/js/core/auth.js"></script>
  <script src="../assets/js/utils/layout.js"></script>
  <script src="../assets/js/utils/keyboard-navigation.js"></script>
  <script src="../assets/js/utils/language.js"></script>
  <script>
    RomeoAuth.requireAuth("view_activity_log");

    const state = {
      logs: [],
      filtered: [],
      selectedIds: new Set(),
      offset: 0,
      pageSize: 100,
      hasMore: false,
      loadingMore: false
    };

    const els = {
      search: document.getElementById("searchInput"),
      action: document.getElementById("actionFilter"),
      entity: document.getElementById("entityFilter"),
      fromDate: document.getElementById("fromDate"),
      toDate: document.getElementById("toDate"),
      refresh: document.getElementById("refreshBtn"),
      body: document.getElementById("logsBody"),
      total: document.getElementById("totalLogs"),
      deletes: document.getElementById("deleteLogs"),
      updates: document.getElementById("updateLogs"),
      creates: document.getElementById("createLogs"),
      selectAll: document.getElementById("selectAllLogs"),
      selectedCount: document.getElementById("selectedLogsCount"),
      deleteSelected: document.getElementById("deleteSelectedLogsBtn"),
      loadMoreWrap: document.getElementById("loadMoreWrap"),
      loadMore: document.getElementById("loadMoreBtn")
    };

    const ACTION_LABELS = {
      delete: { en: "Delete", ar: "حذف" },
      update: { en: "Update", ar: "تعديل" },
      create: { en: "Create", ar: "إضافة" },
      login: { en: "Login", ar: "تسجيل دخول" },
      logout: { en: "Logout", ar: "تسجيل خروج" },
      close_day: { en: "Day Closing", ar: "تقفيلة يوم" },
      system: { en: "System", ar: "النظام" }
    };

    const ENTITY_LABELS = {
      invoice: { en: "Invoice", ar: "فاتورة" },
      expense: { en: "Expense", ar: "مصروف" },
      withdrawal: { en: "Withdrawal", ar: "سحب" },
      services: { en: "Services", ar: "الخدمات" },
      user: { en: "User", ar: "مستخدم" },
      system: { en: "System", ar: "النظام" },
      monthly_closing: { en: "Monthly Closing", ar: "تقفيلة شهرية" },
      daily_closing: { en: "Daily Closing", ar: "تقفيلة يومية" }
    };

    function currentLanguage() {
      return window.RomeoLanguage?.getCurrentLanguage?.()
        || localStorage.getItem("romeo-pos-language")
        || document.body?.dataset.language
        || "ar";
    }

    function labelFrom(map, key) {
      const language = currentLanguage();
      return map[key] ? map[key][language] : (key || "-");
    }

    function localizeText(arText, enText) {
      return currentLanguage() === "en" ? enText : arText;
    }

    function localizeUserName(value) {
      const text = decodeText(value || "").trim();
      if (!text) return "-";
      if (currentLanguage() !== "en") return text;

      const normalized = text.replace(/\s+/g, " ");
      const names = {
        "مالك النظام": "System Owner",
        "النظام": "System"
      };
      return names[normalized] || text;
    }

    function decodeText(value) {
      const text = String(value || "").trim();
      return window.__decodeText ? window.__decodeText(text) : text;
    }

    function normalizeText(value) {
      return decodeText(value).toLowerCase();
    }

    function normalizeAction(value) {
      const text = normalizeText(value).replace(/[\s-]+/g, "_");
      if (text.includes("delete") || text.includes("حذف")) return "delete";
      if (text.includes("update") || text.includes("تعديل")) return "update";
      if (text.includes("create") || text.includes("add") || text.includes("إضافة") || text.includes("اضافة")) return "create";
      if (text.includes("logout") || text.includes("خروج")) return "logout";
      if (text.includes("login") || text.includes("دخول")) return "login";
      if (text.includes("close_day") || text.includes("day_closing") || text.includes("تقفيلة_يوم")) return "close_day";
      if (text.includes("system") || text.includes("النظام")) return "system";
      return text;
    }

    function normalizeEntityType(value) {
      const text = normalizeText(value).replace(/[\s-]+/g, "_");
      if (text.includes("invoice") || text.includes("فاتورة")) return "invoice";
      if (text.includes("expense") || text.includes("مصروف")) return "expense";
      if (text.includes("withdrawal") || text.includes("سحب")) return "withdrawal";
      if (text.includes("service") || text.includes("الخدمات")) return "services";
      if (text.includes("user") || text.includes("مستخدم")) return "user";
      if (text.includes("monthly") || text.includes("month_lock") || text.includes("تقفيلة_شهر")) return "monthly_closing";
      if (text.includes("daily") || text.includes("close_day") || text.includes("تقفيلة_يوم")) return "daily_closing";
      if (text.includes("system") || text.includes("النظام")) return "system";
      return text;
    }

    function normalizeLog(log, index) {
      const action = normalizeAction(log.action || log.type || log.actionType);
      const entityType = normalizeEntityType(log.entityType || log.entity || log.targetType);

      return {
        logId: decodeText(log.logId || log.id || `LOG-${index + 1}`),
        action,
        entityType,
        entityId: decodeText(log.entityId || log.targetId || ""),
        userName: decodeText(log.userName || log.username || log.user || ""),
        displayName: decodeText(log.displayName || log.name || ""),
        details: decodeText(log.details || log.description || log.message || ""),
        createdAt: decodeText(log.createdAt || log.dateTime || log.timestamp || log.date || "")
      };
    }

    function getDateKey(value) {
      const text = String(value || "").trim();
      const match = text.match(/(\d{4})-(\d{2})-(\d{2})/);
      return match ? match[0] : "";
    }

    function formatDateTime(value) {
      const text = String(value || "").trim();
      if (!text) return "-";
      return text.replace("T", " ").replace(/\.\d+Z?$/, "");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function setEmpty(message) {
      els.body.innerHTML = `<tr><td class="empty" colspan="7">${escapeHtml(message)}</td></tr>`;
      updateSelectionControls();
    }

    function renderMetrics() {
      els.total.textContent = state.filtered.length;
      els.deletes.textContent = state.filtered.filter(log => log.action === "delete").length;
      els.updates.textContent = state.filtered.filter(log => log.action === "update").length;
      els.creates.textContent = state.filtered.filter(log => log.action === "create").length;
    }

    function getVisibleLogIds() {
      return state.filtered.map(log => String(log.logId || "")).filter(Boolean);
    }

    function updateSelectionControls() {
      const visibleIds = getVisibleLogIds();
      const visibleIdSet = new Set(visibleIds);
      state.selectedIds = new Set([...state.selectedIds].filter(id => visibleIdSet.has(id)));

      const selectedCount = state.selectedIds.size;
      const visibleSelectedCount = visibleIds.filter(id => state.selectedIds.has(id)).length;

      els.selectedCount.textContent = localizeText(`${selectedCount} محدد`, `${selectedCount} selected`);
      els.deleteSelected.disabled = selectedCount === 0;
      els.selectAll.disabled = visibleIds.length === 0;
      els.selectAll.checked = visibleIds.length > 0 && visibleSelectedCount === visibleIds.length;
      els.selectAll.indeterminate = visibleSelectedCount > 0 && visibleSelectedCount < visibleIds.length;
    }

    function renderLogs() {
      renderMetrics();
      updateLoadMoreButton();

      if (!state.filtered.length) {
        setEmpty(localizeText("لا توجد عمليات مطابقة للفلاتر الحالية.", "No activity matches the current filters."));
        return;
      }

      els.body.innerHTML = state.filtered.map(log => {
        const user = localizeUserName(log.displayName || log.userName || "-");
        const actionClass = ACTION_LABELS[log.action] ? log.action : "";
        const entityLabel = labelFrom(ENTITY_LABELS, log.entityType);
        const entityId = log.entityId ? ` <span class="muted">#${escapeHtml(log.entityId)}</span>` : "";
        const logId = String(log.logId || "");

        return `
          <tr>
            <td><input class="log-select" type="checkbox" data-select-log="${escapeHtml(logId)}" ${state.selectedIds.has(logId) ? "checked" : ""}></td>
            <td><span class="badge ${escapeHtml(actionClass)}">${escapeHtml(labelFrom(ACTION_LABELS, log.action))}</span></td>
            <td>${escapeHtml(user)}</td>
            <td>${escapeHtml(formatDateTime(log.createdAt))}</td>
            <td>${escapeHtml(entityLabel)}${entityId}</td>
            <td><div class="details">${escapeHtml(log.details || "-")}</div></td>
            <td><button class="mini-delete" type="button" data-delete-log="${escapeHtml(logId)}">${escapeHtml(localizeText("حذف", "Delete"))}</button></td>
          </tr>
        `;
      }).join("");
      updateSelectionControls();
    }

    function applyFilters() {
      const query = normalizeText(els.search.value);
      const action = normalizeText(els.action.value);
      const entity = normalizeText(els.entity.value);
      const fromDate = els.fromDate.value;
      const toDate = els.toDate.value;

      state.filtered = state.logs.filter(log => {
        const haystack = normalizeText([
          log.action,
          log.entityType,
          log.entityId,
          log.userName,
          log.displayName,
          log.details,
          log.createdAt
        ].join(" "));
        const dateKey = getDateKey(log.createdAt);

        if (query && !haystack.includes(query)) return false;
        if (action && log.action !== action) return false;
        if (entity && log.entityType !== entity) return false;
        if (fromDate && dateKey && dateKey < fromDate) return false;
        if (toDate && dateKey && dateKey > toDate) return false;
        return true;
      });

      updateSelectionControls();
      renderLogs();
    }

    function updateLoadMoreButton() {
      if (!els.loadMoreWrap || !els.loadMore) return;

      els.loadMoreWrap.hidden = !state.hasMore;
      els.loadMore.disabled = state.loadingMore;
      els.loadMore.textContent = state.loadingMore
        ? localizeText("جاري تحميل المزيد...", "Loading more...")
        : localizeText("عرض المزيد", "Load More");
    }

    async function deleteActivityLog(log) {
      const response = await RomeoApi.request({
        action: "deleteActivityLog",
        logId: log.logId,
        id: log.logId,
        createdAt: log.createdAt,
        entityId: log.entityId,
        entityType: log.entityType,
        details: log.details
      });

      if (response.status !== "success") {
        const message = String(response.message || "");
        if (/not found/i.test(message)) {
          return;
        }
        throw new Error(response.message || localizeText("تعذر حذف السجل.", "Could not delete log."));
      }
    }

    async function deleteSelectedLogs() {
      const selectedLogs = state.filtered.filter(log => state.selectedIds.has(String(log.logId || "")));
      if (!selectedLogs.length) {
        updateSelectionControls();
        return;
      }

      if (!confirm(localizeText(`حذف ${selectedLogs.length} عملية من سجل النشاط؟`, `Delete ${selectedLogs.length} activity log records?`))) {
        return;
      }

      els.deleteSelected.disabled = true;
      els.deleteSelected.textContent = localizeText("جاري الحذف...", "Deleting...");

      try {
        for (const log of selectedLogs) {
          await deleteActivityLog(log);
        }
        state.selectedIds.clear();
        await loadLogs();
      } catch (error) {
        alert(error.message || localizeText("تعذر حذف السجلات المحددة.", "Could not delete selected logs."));
      } finally {
        els.deleteSelected.textContent = localizeText("حذف المحدد", "Delete Selected");
        updateSelectionControls();
      }
    }

    async function deleteSingleLog(logId) {
      const log = state.filtered.find(item => String(item.logId || "") === String(logId));
      if (!log) return;

      if (!confirm(localizeText("حذف هذه العملية من سجل النشاط؟", "Delete this activity log record?"))) {
        return;
      }

      try {
        await deleteActivityLog(log);
        state.selectedIds.delete(String(logId));
        await loadLogs();
      } catch (error) {
        alert(error.message || localizeText("تعذر حذف السجل.", "Could not delete log."));
      }
    }

    async function loadLogs({ append = false } = {}) {
      state.loadingMore = append;
      updateLoadMoreButton();

      if (!append) {
        state.offset = 0;
        state.hasMore = false;
        state.logs = [];
        state.filtered = [];
        state.selectedIds.clear();
        setEmpty(localizeText("جاري تحميل آخر 100 عملية...", "Loading latest 100 activity logs..."));
      }

      try {
        const response = await RomeoApi.request({
          action: "getActivityLogs",
          limit: state.pageSize,
          offset: append ? state.offset : 0
        });
        if (response.status !== "success") {
          throw new Error(response.message || "Activity log API is not ready.");
        }

        const rows = response.logs || response.activityLogs || [];
        const backendIgnoredPaging = rows.length > state.pageSize;
        const pageRows = backendIgnoredPaging
          ? rows.slice(state.offset, state.offset + state.pageSize)
          : rows;
        const normalizedRows = pageRows.map((log, index) => normalizeLog(log, state.offset + index));
        state.logs = append ? state.logs.concat(normalizedRows) : normalizedRows;
        state.logs = state.logs.sort((a, b) => String(b.createdAt).localeCompare(String(a.createdAt)));
        state.offset += pageRows.length;
        state.hasMore = backendIgnoredPaging
          ? state.offset < rows.length
          : Boolean(response.hasMore);
        applyFilters();
      } catch (error) {
        if (!append) {
          state.logs = [];
          state.filtered = [];
          renderMetrics();
          setEmpty(
            localizeText(
              "تعذر تحميل سجل العمليات.",
              "Could not load activity log."
            )
          );
        }
      } finally {
        state.loadingMore = false;
        updateLoadMoreButton();
      }
    }

    [els.search, els.action, els.entity, els.fromDate, els.toDate].forEach(element => {
      element.addEventListener("input", applyFilters);
      element.addEventListener("change", applyFilters);
    });

    els.refresh.addEventListener("click", loadLogs);
    els.selectAll.addEventListener("change", event => {
      const visibleIds = getVisibleLogIds();
      if (event.target.checked) {
        visibleIds.forEach(id => state.selectedIds.add(id));
      } else {
        visibleIds.forEach(id => state.selectedIds.delete(id));
      }
      renderLogs();
    });
    els.deleteSelected.addEventListener("click", deleteSelectedLogs);
    els.body.addEventListener("change", event => {
      const checkbox = event.target.closest("[data-select-log]");
      if (!checkbox) return;

      const id = String(checkbox.dataset.selectLog || "");
      if (checkbox.checked) {
        state.selectedIds.add(id);
      } else {
        state.selectedIds.delete(id);
      }
      updateSelectionControls();
    });
    els.body.addEventListener("click", event => {
      const button = event.target.closest("[data-delete-log]");
      if (!button) return;
      deleteSingleLog(button.dataset.deleteLog);
    });
    els.loadMore.addEventListener("click", () => loadLogs({ append: true }));
    window.addEventListener("romeo-language-change", renderLogs);
    loadLogs();
  </script>
</body>
</html>
